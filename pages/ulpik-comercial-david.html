//==================== JSON robusto ====================
function balanceJSON(str){let inS=false,esc=false,o=0,b=0;for(let i=0;i<str.length;i++){const c=str[i];if(esc){esc=false;continue;}if(c==="\\"){esc=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==="{")o++;else if(c==="}")o--;else if(c==="[")b++;else if(c==="]")b--;}let s=str;if(inS)s+='"';s=s.replace(/\s+$/,"").replace(/[,:]$/,"").replace(/,\s*"[^"]*"$/,"");if(b>0)s+="]".repeat(b);if(o>0)s+="}".repeat(o);return s;}
function parseJSON(txt){let c=(txt||"").replace(/```json/gi,"").replace(/```/g,"").trim();const s=c.indexOf("{");if(s===-1)throw new Error("Sin JSON en la respuesta");c=c.slice(s);const clean=c.replace(/[\u0000-\u001F]+/g," ");const e=clean.lastIndexOf("}");const cands=[];if(e!==-1)cands.push(clean.slice(0,e+1));cands.push(clean);cands.push(clean.replace(/,\s*([}\]])/g,"$1"));cands.push(balanceJSON(clean));cands.push(balanceJSON(clean).replace(/,\s*([}\]])/g,"$1"));for(const x of cands){try{return JSON.parse(x);}catch(_){}}throw new Error("JSON inválido tras intentar reparar");}

// Mismo Web App que Pulso del Equipo (scripts/pulso-equipo-sheets.gs, action=chat)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4TBSsIpLm8ddD1R0Zuo_5AQBhfz3DJ2GrKnlJgib8IkANKOpnGtF4_ABYXXj8NKDwtQ/exec';

function fetchJsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_ulpikDavid_' + Date.now();
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 120000);
    const script = document.createElement('script');
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('No se pudo conectar con Apps Script')); };
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + encodeURIComponent(cb);
    document.head.appendChild(script);
  });
}

async function callAPI(sub, userMsg) {
  if (!APPS_SCRIPT_URL) {
    throw new Error('Apps Script no configurado.');
  }
  const payload = { sub, userMsg };
  const jsonPayload = JSON.stringify(payload);
  const getUrl = APPS_SCRIPT_URL + '?action=chat&payload=' + encodeURIComponent(jsonPayload);

  let data;
  if (getUrl.length <= 7500) {
    data = await fetchJsonp(getUrl);
  } else {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      body: new URLSearchParams({ action: 'chat', payload: jsonPayload })
    });
    const raw = await res.text();
    try { data = JSON.parse(raw); } catch (e) {
      throw new Error('Respuesta inválida del servidor. Redespliega Apps Script con action=chat.');
    }
  }

  if (data.status === 'error') throw new Error(data.message || 'Error de API');
  if (data.message && !data.text) {
    throw new Error('Apps Script sin action=chat. Pega el código nuevo de pulso-equipo-sheets.gs en Google y redespliega la Web App.');
  }
  const t = data.text || '';
  if (!t.trim()) throw new Error('Respuesta vacía del modelo');
  return parseJSON(t);
}

//==================== estado ====================
let mode="apoyo",need="objecion";
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{mode=t.dataset.mode;$("#t-apoyo").classList.toggle("on",mode==="apoyo");$("#t-aud").classList.toggle("on",mode==="auditoria");render();});

//==================== MODO APOYO ====================
const NEEDS=[["objecion","🛡️","Responder objeción"],["seguimiento","⏱️","Ideas de seguimiento"],["cierre","🏁","Empujar al cierre"],["consejo","🧭","Consejo general"]];
function viewApoyo(){
  const ph={objecion:"Ej. 'Está muy caro, vi otra opción en $200'",seguimiento:"Ej. Le mandé la oferta hace 3 días y quedó en visto.",cierre:"Ej. El cliente dijo 'me interesa, ¿cómo procedemos?'",consejo:"Ej. El cliente da vueltas y no concreta, ¿qué hago?"}[need];
  return `<div class="card">
    <label class="lbl">¿Con qué te ayudo?</label>
    <div class="needs">${NEEDS.map(n=>`<div class="need ${need===n[0]?'on':''}" data-need="${n[0]}"><span class="ic">${n[1]}</span>${n[2]}</div>`).join("")}</div>
    <label class="lbl">Último mensaje del cliente o situación <span style="color:#f43f5e">*</span></label>
    <textarea id="a-msg" class="txt mb" rows="4" placeholder="${esc(ph)}"></textarea>
    <div class="row mb"><input id="a-nom" class="txt" placeholder="Nombre del cliente (opcional)"><input id="a-mar" class="txt" placeholder="Nombre de la marca (opcional)"></div>
    <input id="a-ctx" class="txt mb" placeholder="Contexto: fase, si es recontacto, qué descubriste... (opcional)">
    <div id="a-err"></div>
    <button class="btn" id="a-go">📨 Generar respuesta</button>
    <div id="a-out"></div>
  </div>`;
}
function bindApoyo(){
  document.querySelectorAll("[data-need]").forEach(d=>d.onclick=()=>{need=d.dataset.need;const m=$("#a-msg")?$("#a-msg").value:"";render();if($("#a-msg"))$("#a-msg").value=m;});
  $("#a-go").onclick=async()=>{
    const msg=$("#a-msg").value.trim();const errEl=$("#a-err");
    if(!msg){errEl.innerHTML='<p class="err">Pega el último mensaje del cliente o describe la situación.</p>';return;}
    errEl.innerHTML="";const btn=$("#a-go");btn.disabled=true;btn.textContent="Preparando tu respuesta…";$("#a-out").innerHTML="";
    const u=`Soy el ASESOR de ULPIK. Ayúdame con esta situación.\nCliente: ${$("#a-nom").value||"(desconocido)"}\nMarca: ${$("#a-mar").value||"(desconocida)"}\nContexto: ${$("#a-ctx").value||"(ninguno)"}\n\n=== ÚLTIMO MENSAJE / SITUACIÓN ===\n${msg}`;
    try{const r=await callAPI(subApoyo(need),u);renderApoyoOut(r);}
    catch(e){errEl.innerHTML='<p class="err">No se pudo generar la respuesta. Inténtalo de nuevo en unos segundos.</p><p class="errd">Detalle técnico: '+esc(e.message||e)+'</p>';}
    finally{btn.disabled=false;btn.textContent="📨 Generar respuesta";}
  };
}
function renderApoyoOut(r){
  copyStore=[];const luz=luzC(r.luz);
  let h='<div class="card mt" style="margin-bottom:16px">';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">';
  if(r.tipo)h+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;color:#64748b">'+esc(r.tipo)+'</span>';
  if(luz)h+='<span class="badge" style="background:'+luz[0]+';color:'+luz[1]+'">'+esc(luz[2])+'</span>';
  h+='</div><p class="lectura">'+esc(r.lectura)+'</p></div>';
  (r.respuestas||[]).forEach((x,i)=>{copyStore.push(x.mensaje||"");h+='<div class="resp"><div class="hd"><b>'+esc(x.label||("Opción "+(i+1)))+'</b><button class="copy" data-copy="'+i+'">⧉ Copiar</button></div><div class="bd">'+esc(x.mensaje)+'</div></div>';});
  if(r.siguientePaso)h+='<div class="nextbox"><div>→</div><div><div class="t">Siguiente paso</div><div>'+esc(r.siguientePaso)+'</div></div></div>';
  if((r.tips||[]).length)h+='<div class="tipsbox"><div class="t">💡 Recuerda del Playbook</div><ul>'+r.tips.map(t=>'<li>• '+esc(t)+'</li>').join("")+'</ul></div>';
  $("#a-out").innerHTML=h;bindCopies();
}

//==================== MODO AUDITORÍA ====================
let audState={loading:false,prog:0,res:null,err:"",errd:""};
function viewAud(){
  if(audState.res)return renderAudResults(audState.res);
  return `<div class="card">
    <h2 style="margin:0 0 4px;font-size:16px">📄 Conversación a auditar</h2>
    <p class="hint" style="margin-top:0">Pega el chat tal cual sale del CRM. Interpreta solo quién es asesor/cliente e ignora audios y ruido.</p>
    <div class="row mb"><div><label class="lbl">Nombre del cliente <span class="opt">(opcional)</span></label><input id="u-cli" class="txt" placeholder="Ej. Daniel"></div><div><label class="lbl">Tipo de venta <span class="opt">(opcional)</span></label><input id="u-tipo" class="txt" placeholder="Ej. Registro de marca"></div></div>
    <label class="lbl">Conversación completa <span style="color:#f43f5e">*</span></label>
    <textarea id="u-chat" class="txt mb" rows="9" placeholder="Pega aquí el chat completo. No importa si trae horas, [Audio], <Multimedia omitido> o líneas sin nombre."></textarea>
    <label class="lbl">Contexto adicional <span class="opt">(opcional)</span></label>
    <textarea id="u-ctx" class="txt mb" rows="2" placeholder="Ej. Es recontacto / es referido / hubo notas de voz..."></textarea>
    <div id="u-err">${audState.err?'<p class="err">'+esc(audState.err)+'</p>'+(audState.errd?'<p class="errd">Detalle técnico: '+esc(audState.errd)+'</p>':''):''}</div>
    <button class="btn" id="u-go" ${audState.loading?'disabled':''}>${audState.loading?'Auditando… ('+audState.prog+'/5)':'Generar auditoría comercial'}</button>
    ${audState.loading?'<div class="bar"><span style="width:'+(audState.prog/5*100)+'%"></span></div><p class="hint">Comparando contra las 6 fases del Playbook por bloques.</p>':''}
  </div>`;
}
function bindAud(){
  const go=$("#u-go");if(!go)return;
  go.onclick=async()=>{
    const chat=$("#u-chat").value.trim();
    if(!chat){audState.err="Pega la conversación con el cliente para analizar.";audState.errd="";render();return;}
    audState={loading:true,prog:0,res:null,err:"",errd:""};const cli=$("#u-cli").value,tipo=$("#u-tipo").value,ctx=$("#u-ctx").value;render();
    const u=`Audita esta conversación contra el Playbook ULPIK. Primero identifica quién es el ASESOR (ULPIK) y quién el CLIENTE, luego evalúa.\nCliente: ${cli||"(no especificado)"}\nTipo de venta: ${tipo||"(no especificado)"}\nContexto: ${ctx||"(ninguno)"}\n\n=== CONVERSACIÓN ===\n${chat}`;
    const tasks=[SUB_RESUMEN,SUB_PASOS,SUB_CALIDAD,SUB_ERRORES,SUB_MENSAJES];let merged={},fails=0,firstErr="";
    for(const sub of tasks){try{const p=await callAPI(sub,u);merged=Object.assign(merged,p);}catch(e){fails++;if(!firstErr)firstErr=String(e.message||e);}audState.prog++;if($("#u-go"))render();}
    audState.loading=false;
    if(Object.keys(merged).length===0){audState.err="No se pudo generar el análisis. Espera unos segundos y vuelve a intentarlo.";audState.errd=firstErr;render();return;}
    if(fails>0)merged.__parcial=fails;audState.res=merged;render();
  };
}
function secOpen(){document.querySelectorAll(".sec>h3").forEach(h=>h.onclick=()=>{const b=h.nextElementSibling;b.style.display=b.style.display==="none"?"block":"none";});}
function sec(ic,col,title,sub,body){return '<div class="sec"><h3><span class="ic" style="background:'+col+'22;color:'+col+'">'+ic+'</span><span style="flex:1"><span style="display:block">'+title+'</span><span style="font-size:12px;color:#94a3b8;font-weight:400">'+sub+'</span></span></h3><div class="body">'+body+'</div></div>';}
function renderAudResults(r){
  copyStore=[];let h="";
  if(r.__parcial)h+='<div class="amber">'+r.__parcial+' bloque(s) no se pudieron generar. El resto está completo; puedes auditar de nuevo para reintentar.</div>';
  if(r.puntajeGeneral){const p=r.puntajeGeneral,c=lvlC(p.puntaje);
    h+='<div class="card"><div class="gscore"><div class="ring" style="background:conic-gradient('+c+' '+((p.puntaje||0)*3.6)+'deg,#e2e8f0 0deg)"><div><b style="color:'+c+'">'+p.puntaje+'</b><span style="font-size:10px;color:#94a3b8">/ 100</span></div></div><div style="flex:1"><span class="badge" style="background:'+c+'1a;color:'+c+';margin-bottom:8px">'+esc(p.nivel)+'</span><p style="color:#475569;margin:8px 0 0">'+esc(p.resumen)+'</p></div></div></div>';}
  if((r.evaluacionPasos||[]).length){let b="";r.evaluacionPasos.forEach(p=>{const[bg,tx,dt]=cump(p.cumplimiento);b+='<div class="step"><div class="sh" style="background:'+bg+';color:'+tx+'"><span>'+esc(p.paso)+'</span><span>● '+esc(p.cumplimiento)+' · '+p.puntaje+'/100</span></div><div class="sb"><div><span class="k">Qué debía hacer</span><br>'+esc(p.debiaHacer)+'</div><div><span class="k">Qué hizo</span><br>'+esc(p.queHice)+'</div>'+(p.evidencia&&p.evidencia!=="—"?'<div class="full"><span class="k">Evidencia</span><br><span class="cite">'+esc(p.evidencia)+'</span></div>':'')+'<div class="full"><span class="k">Mejora</span><br>'+esc(p.comentario)+'</div></div></div>';});h+=sec("✓","#0ea5e9","Evaluación por fases del Playbook","Cumplimiento paso a paso",b);}
  if((r.calidadComercial||[]).length){let b='<div class="dims">';r.calidadComercial.forEach(d=>{const c=dimC(d.puntaje);b+='<div class="dim"><div class="top"><span>'+esc(d.dimension)+'</span><span style="color:'+c+'">'+d.puntaje+'/10</span></div><div class="pb"><span style="width:'+(d.puntaje*10)+'%;background:'+c+'"></span></div><p><span style="color:#059669;font-weight:600">✓ </span>'+esc(d.bien)+'</p><p><span style="color:#d97706;font-weight:600">→ </span>'+esc(d.mejorar)+'</p>'+(d.ejemplo&&d.ejemplo!=="—"?'<p class="cite">'+esc(d.ejemplo)+'</p>':'')+'</div>';});b+='</div>';h+=sec("📊","#7c3aed","Análisis de calidad comercial","12 dimensiones",b);}
  if(r.errores){let b="";[["criticos","Críticos — afectan la venta","#dc2626","#fee2e2"],["tacticos","Tácticos — reducen la calidad","#d97706","#fef9c3"],["forma","De forma — tono, claridad, orden","#64748b","#f1f5f9"]].forEach(g=>{const arr=r.errores[g[0]]||[];if(arr.length){b+='<p style="font-size:11px;font-weight:700;text-transform:uppercase;color:'+g[2]+';margin:12px 0 8px">'+g[1]+'</p>';arr.forEach(e=>{b+='<div class="errg" style="background:'+g[3]+'"><b>'+esc(e.que)+'</b><p><span class="k">Por qué afecta:</span> '+esc(e.porque)+'</p><p><span class="k">Qué decía el playbook:</span> '+esc(e.debia)+'</p><p><span class="k">Cómo corregirlo:</span> '+esc(e.corregir)+'</p></div>';});}});h+=sec("⚠️","#dc2626","Errores principales","Críticos, tácticos y de forma",b);}
  if((r.oportunidades||[]).length){let b="";r.oportunidades.forEach((o,i)=>{b+='<div class="errg" style="border:1px solid #f1f5f9"><b>'+(i+1)+'. '+esc(o.mejora)+'</b><p><span class="k">Por qué importa:</span> '+esc(o.porque)+'</p><p><span class="k">Cómo aplicarla:</span> '+esc(o.comoAplicar)+'</p><p style="background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:8px"><span class="k">Ejemplo:</span> '+esc(o.ejemploMensaje)+'</p></div>';});h+=sec("💡","#d97706","Oportunidades de mejora","Recomendaciones accionables",b);}
  if((r.mensajesReescritos||[]).length){let b="";r.mensajesReescritos.forEach((m,i)=>{copyStore.push(m.mejorado||"");b+='<div class="resp"><div class="bd" style="background:#fef2f2"><b style="font-size:10px;text-transform:uppercase;color:#ef4444">Original</b><br>'+esc(m.original)+'</div><div style="padding:8px 14px;background:#fffbeb;font-size:12px;color:#92400e"><b>Problema:</b> '+esc(m.problema)+'</div><div class="hd" style="background:#ecfdf5"><b style="color:#059669">Mejorado</b><button class="copy" data-copy="'+i+'">⧉ Copiar</button></div><div class="bd">'+esc(m.mejorado)+'</div><div style="padding:8px 14px;font-size:12px;color:#64748b"><b>Por qué funciona:</b> '+esc(m.motivo)+'</div></div>';});h+=sec("✍️","#0891b2","Mensajes reescritos","Los momentos clave, mejorados",b);}
  if(r.diagnosticoCliente){const d=r.diagnosticoCliente;let b='<div class="sb" style="display:grid">';[["Nivel de interés",d.interes],["Nivel de urgencia",d.urgencia],["Objeciones explícitas",d.objExplicitas],["Objeciones implícitas",d.objImplicitas],["Señales de compra",d.senalesCompra],["Qué necesitaba realmente",d.necesitaba]].forEach(x=>b+='<div><span class="k">'+x[0]+'</span><br>'+esc(x[1])+'</div>');b+='<div class="full"><span class="k">Siguiente paso que tenía más sentido</span><br>'+esc(d.siguientePaso)+'</div></div>';h+=sec("🔍","#4f46e5","Diagnóstico del cliente","Lectura comercial",b);}
  if(r.siguienteAccion)h+=sec("➡️","#16a34a","Siguiente mejor acción","La jugada óptima",'<div class="nextbox" style="margin-top:0"><div></div><div><b style="color:#065f46;font-size:15px">'+esc(r.siguienteAccion.accion)+'</b><p style="margin:4px 0 0">'+esc(r.siguienteAccion.justificacion)+'</p></div></div>');
  if(r.planMejora){const p=r.planMejora;let b='<div class="plan">';b+='<div class="planb" style="background:#ecfdf5;border:1px solid #d1fae5"><div class="t" style="color:#059669">Seguir haciendo</div><ul>'+(p.seguir||[]).map(x=>'<li>✓ '+esc(x)+'</li>').join("")+'</ul></div>';b+='<div class="planb" style="background:#fef2f2;border:1px solid #fee2e2"><div class="t" style="color:#dc2626">Corregir</div><ul>'+(p.corregir||[]).map(x=>'<li>→ '+esc(x)+'</li>').join("")+'</ul></div>';b+='<div class="planb" style="background:#eff6ff;border:1px solid #dbeafe"><div class="t" style="color:#0284c7">Frases/recursos</div><ul>'+(p.frasesRecursos||[]).map(x=>'<li>+ '+esc(x)+'</li>').join("")+'</ul></div></div>';b+='<div class="focus"><div class="t">Foco principal para tu próxima conversación</div><div style="font-weight:500">'+esc(p.focoPrincipal)+'</div></div>';h+=sec("🎯","#1e293b","Plan de mejora personal","Tu foco para la próxima",b);}
  h+='<button class="btn ghost" id="u-reset">↺ Auditar otra conversación</button>';
  setTimeout(()=>{secOpen();bindCopies();const rs=$("#u-reset");if(rs)rs.onclick=()=>{audState={loading:false,prog:0,res:null,err:"",errd:""};render();};},0);
  return h;
}

//==================== render principal ====================
function render(){
  $("#view").innerHTML=mode==="apoyo"?viewApoyo():viewAud();
  if(mode==="apoyo")bindApoyo();else bindAud();
  if(mode==="auditoria"&&audState.res){secOpen();bindCopies();const rs=$("#u-reset");if(rs)rs.onclick=()=>{audState={loading:false,prog:0,res:null,err:"",errd:""};render();};}
}
render();
</script>
