<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Seguimiento de Marca — API UPK 8n66ly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Consolas, Monaco, monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; line-height: 1.5; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { color: #5B2A86; margin-bottom: 8px; font-family: system-ui, sans-serif; }
    .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; font-family: system-ui, sans-serif; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    input { flex: 1; min-width: 200px; padding: 10px 14px; font-size: 15px; border: 1px solid #444; border-radius: 6px; background: #252526; color: #fff; }
    button { background: #5B2A86; color: white; border: none; padding: 10px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; }
    button:hover { background: #6d349e; }
    .section { background: #252526; padding: 15px; margin: 10px 0; border-radius: 6px; border-left: 3px solid #5B2A86; }
    .section h3 { color: #119C95; margin-bottom: 10px; font-size: 14px; }
    .success { border-left-color: #119C95; }
    .error { border-left-color: #f48771; }
    .warning { border-left-color: #dcdcaa; }
    pre { background: #1e1e1e; padding: 12px; border-radius: 4px; overflow-x: auto; color: #ce9178; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    .metric { margin: 5px 0; font-size: 13px; }
    .metric span { color: #4ec9b0; font-weight: bold; }
    .step { padding: 4px 0; border-bottom: 1px solid #333; font-size: 12px; }
    .step.err { color: #f48771; }
    .step.ok { color: #98c379; }
    img { max-width: 120px; max-height: 120px; border-radius: 14px; margin: 10px 0; background: #FAF9F7; border: 1px solid #E7E3DD; object-fit: contain; }
    .stages { list-style: none; margin-top: 8px; font-family: system-ui, sans-serif; }
    .stages li { padding: 4px 0; font-size: 13px; }
    .stages li.active { color: #119C95; font-weight: bold; }
    .stages li.done { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Seguimiento de Marca</h1>
    <p class="subtitle">Diagnóstico completo — código por defecto: <strong>8n66ly</strong>. Misma lógica que el artefacto.</p>
    <div class="row">
      <input id="upkInput" type="text" value="8n66ly" placeholder="Código UPK">
      <button onclick="runTest()">Ejecutar test</button>
    </div>
    <div id="results"></div>
  </div>
  <script>
    const API_URL = 'https://api.ulpik.com/api/brand/upk';
    const LOGO_CDN = 'https://imagedelivery.net/TyoaKSszdYgjylRv6IzBsw';
    const STAGES = ['Presentación de solicitud','Asignación de funcionario','Examen de forma','Publicación en gaceta y oposiciones','Examen de fondo','Resolución','Título de la marca'];

    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function normalizeUpkCode(raw) {
      const q = String(raw || '').trim().toUpperCase();
      return q ? q.replace(/^UPK[-_\s]*/i, '') : '';
    }
    function displayUpkCode(raw) {
      const core = normalizeUpkCode(raw);
      return core ? (core.indexOf('UPK') === 0 ? core : 'UPK-' + core) : '';
    }
    function buildLogoUrl(logoUrl) {
      const v = String(logoUrl || '').trim();
      if (!v) return '';
      return /^https?:\/\//i.test(v) ? v : LOGO_CDN + '/' + v + '/public';
    }
    function stageIndexFromEtapa(etapa) {
      if (etapa == null || etapa === '') return null;
      const e = String(etapa).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const maps = [['presentacion','solicitud','ingreso'],['asignacion','funcionario','turno'],['examen de forma','forma'],['publicacion','gaceta','oposicion'],['examen de fondo','fondo'],['resolucion'],['titulo','conced']];
      for (let i = 0; i < maps.length; i++) if (maps[i].some(k => e.includes(k))) return i;
      const n = parseInt(etapa, 10);
      return (!isNaN(n) && n >= 1 && n <= 7) ? n - 1 : null;
    }
    function normalizeApiBrand(data, upk) {
      const b = data.brand || {};
      const etapaIdx = stageIndexFromEtapa(b.etapaTramite);
      let start = b.startDate || b.fechaInicio || '';
      if (start && String(start).includes('T')) start = String(start).split('T')[0];
      return {
        id: displayUpkCode(upk), name: b.nameBrand || b.name || 'Marca registrada',
        expediente: b.expediente || b.numeroExpediente || '—', start: start || new Date().toISOString().slice(0, 10),
        logoUrl: buildLogoUrl(b.logoUrl), logoRaw: b.logoUrl || '', etapaIndex: etapaIdx,
        etapaLabel: b.etapaTramite || '', upkFromApi: b.upkCode || '',
      };
    }
    function stepLog(log, msg, extra, ok) {
      log.push({ ms: performance.now(), msg, extra, ok });
    }
    function renderSteps(log, t0) {
      return log.map(s => {
        const cls = s.ok === false ? 'err' : (s.ok === true ? 'ok' : '');
        const t = ((s.ms - t0)).toFixed(0);
        const ex = s.extra ? ' — ' + esc(typeof s.extra === 'string' ? s.extra : JSON.stringify(s.extra)) : '';
        return `<div class="step ${cls}">[+${t}ms] ${esc(s.msg)}${ex}</div>`;
      }).join('');
    }
    function renderHeaders(headers) {
      if (!headers || !headers.forEach) return '(sin headers)';
      const rows = [];
      headers.forEach((v, k) => rows.push(`${k}: ${v}`));
      return esc(rows.join('\n') || '(vacío)');
    }
    function renderStages(etapaIndex) {
      return STAGES.map((name, i) => {
        let cls = etapaIndex != null ? (i < etapaIndex ? 'done' : (i === etapaIndex ? 'active' : '')) : '';
        const mark = i === etapaIndex ? '→ ' : i < etapaIndex ? '✓ ' : '  ';
        return `<li class="${cls}">${mark}${i + 1}. ${name}</li>`;
      }).join('');
    }
    function testLogo(url) {
      return new Promise(resolve => {
        if (!url) return resolve({ ok: false, error: 'Sin URL de logo' });
        const img = new Image();
        const t0 = performance.now();
        const timer = setTimeout(() => resolve({ ok: false, error: 'Timeout cargando logo (10s)', url }), 10000);
        img.onload = () => { clearTimeout(timer); resolve({ ok: true, ms: (performance.now() - t0).toFixed(0), w: img.naturalWidth, h: img.naturalHeight, url }); };
        img.onerror = () => { clearTimeout(timer); resolve({ ok: false, error: 'Error al cargar imagen (404/CORS/bloqueado)', url }); };
        img.src = url;
      });
    }

    async function runTest() {
      const input = document.getElementById('upkInput').value;
      const resultsDiv = document.getElementById('results');
      const code = normalizeUpkCode(input);
      const url = API_URL + '/' + encodeURIComponent(code);
      const log = [];
      const t0 = performance.now();
      const debug = { input, code, url, steps: [] };

      resultsDiv.innerHTML = '<div class="section"><h3>⏳ Ejecutando diagnóstico...</h3></div>';

      stepLog(log, 'Input recibido', { input, code, url });
      if (!code) {
        resultsDiv.innerHTML = `<div class="section error"><h3>❌ Código inválido</h3><pre>${renderSteps(log, t0)}</pre></div>`;
        return;
      }

      let res, data, rawText;
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 20000);

      try {
        stepLog(log, 'Enviando fetch GET', url);
        res = await fetch(url, { signal: ctrl.signal });
        stepLog(log, 'Respuesta HTTP', { status: res.status, statusText: res.statusText }, res.ok);
        debug.httpStatus = res.status;
        debug.headers = {};
        res.headers.forEach((v, k) => { debug.headers[k] = v; });
        stepLog(log, 'CORS Allow-Origin', res.headers.get('Access-Control-Allow-Origin') || 'NO CONFIGURADO', !!res.headers.get('Access-Control-Allow-Origin'));
        stepLog(log, 'Cache-Control', res.headers.get('Cache-Control') || 'N/A');

        rawText = await res.text();
        stepLog(log, 'Body recibido', { bytes: rawText.length, preview: rawText.slice(0, 200) });

        try {
          data = JSON.parse(rawText);
          stepLog(log, 'JSON parseado OK', null, true);
        } catch (parseErr) {
          stepLog(log, 'JSON parse FALLÓ', parseErr.message, false);
          debug.parseError = parseErr.message;
          debug.rawBody = rawText.slice(0, 2000);
          throw new Error('Respuesta no es JSON: ' + parseErr.message);
        }
      } catch (err) {
        clearTimeout(timer);
        const isAbort = err.name === 'AbortError';
        stepLog(log, isAbort ? 'TIMEOUT (20s)' : 'Error de red', { name: err.name, message: err.message }, false);
        debug.networkError = { name: err.name, message: err.message };
        resultsDiv.innerHTML = `
          <div class="section error"><h3>❌ ${isAbort ? 'Timeout' : 'Error de conexión'}</h3>
            <div class="metric">Mensaje: <span>${esc(err.message)}</span></div>
            <div class="metric">URL: <span>${esc(url)}</span></div>
            <div class="metric">Tiempo: <span>${((performance.now()-t0).toFixed(2))}ms</span></div>
          </div>
          <div class="section"><h3>📋 Log paso a paso</h3>${renderSteps(log, t0)}</div>
          <div class="section"><h3>🔍 Debug completo</h3><pre>${esc(JSON.stringify(debug, null, 2))}</pre></div>`;
        console.error('[TEST UPK]', debug);
        return;
      } finally {
        clearTimeout(timer);
      }

      debug.durationMs = (performance.now() - t0).toFixed(2);
      debug.data = data;

      if (!res.ok) {
        stepLog(log, 'HTTP error', res.status + ' ' + res.statusText, false);
        resultsDiv.innerHTML = `
          <div class="section error"><h3>❌ HTTP ${res.status}</h3>
            <div class="metric">Mensaje API: <span>${esc(data?.message || res.statusText)}</span></div>
          </div>
          <div class="section"><h3>📨 Headers</h3><pre>${renderHeaders(res.headers)}</pre></div>
          <div class="section"><h3>📋 Log</h3>${renderSteps(log, t0)}</div>
          <div class="section"><h3>📄 JSON</h3><pre>${esc(JSON.stringify(data, null, 2))}</pre></div>`;
        return;
      }

      if (!data.ok) {
        stepLog(log, 'API ok=false', data.message, false);
        resultsDiv.innerHTML = `
          <div class="section error"><h3>❌ API rechazó la consulta</h3>
            <div class="metric">Mensaje: <span>${esc(data.message)}</span></div>
          </div>
          <div class="section"><h3>📋 Log</h3>${renderSteps(log, t0)}</div>
          <div class="section"><h3>📄 JSON</h3><pre>${esc(JSON.stringify(data, null, 2))}</pre></div>`;
        return;
      }

      const brand = normalizeApiBrand(data, input);
      const warnings = [];
      if (!data.brand?.nameBrand) warnings.push('Falta nameBrand');
      if (!data.brand?.logoUrl) warnings.push('Falta logoUrl');
      if (!data.brand?.etapaTramite) warnings.push('Falta etapaTramite');
      if (!data.brand?.startDate) warnings.push('Falta startDate');
      if (brand.etapaIndex == null) warnings.push('etapaTramite no mapea a timeline: "' + (data.brand?.etapaTramite || '') + '"');

      stepLog(log, 'Marca mapeada', brand, true);
      const logoTest = await testLogo(brand.logoUrl);
      stepLog(log, logoTest.ok ? 'Logo cargó OK' : 'Logo FALLÓ', logoTest, logoTest.ok);

      if (warnings.length) stepLog(log, 'Advertencias', warnings.join('; '), false);

      const perf = parseFloat(debug.durationMs);
      const perfMsg = perf < 100 ? 'EXCELENTE' : perf < 500 ? 'BUENO' : perf < 2000 ? 'ACEPTABLE' : 'LENTO';

      resultsDiv.innerHTML = `
        <div class="section success"><h3>✅ Marca encontrada — ${esc(brand.name)}</h3>
          <div class="metric">Código mostrado: <span>${esc(brand.id)}</span></div>
          <div class="metric">UPK API: <span>${esc(brand.upkFromApi)}</span></div>
          <div class="metric">Etapa: <span>${esc(brand.etapaLabel)} → paso ${brand.etapaIndex != null ? brand.etapaIndex + 1 : '?'}</span></div>
          <div class="metric">Fecha: <span>${esc(brand.start)}</span></div>
          <div class="metric">Logo raw: <span>${esc(brand.logoRaw)}</span></div>
          <div class="metric">Logo URL: <span>${esc(brand.logoUrl)}</span></div>
          <div class="metric">Logo carga: <span>${logoTest.ok ? 'OK ' + logoTest.w + 'x' + logoTest.h + ' (' + logoTest.ms + 'ms)' : esc(logoTest.error)}</span></div>
          ${brand.logoUrl ? `<img src="${esc(brand.logoUrl)}" alt="logo">` : ''}
          <ul class="stages">${renderStages(brand.etapaIndex)}</ul>
        </div>
        ${warnings.length ? `<div class="section warning"><h3>⚠️ Advertencias</h3><pre>${esc(warnings.join('\n'))}</pre></div>` : ''}
        <div class="section"><h3>📋 Petición</h3>
          <div class="metric">URL: <span>${esc(url)}</span></div>
          <div class="metric">Tiempo: <span>${debug.durationMs}ms (${perfMsg})</span></div>
        </div>
        <div class="section"><h3>📨 Headers respuesta</h3><pre>${renderHeaders(res.headers)}</pre></div>
        <div class="section"><h3>📋 Log paso a paso</h3>${renderSteps(log, t0)}</div>
        <div class="section"><h3>📄 JSON crudo API</h3><pre>${esc(JSON.stringify(data, null, 2))}</pre></div>
        <div class="section"><h3>🗂️ Marca mapeada (artefacto)</h3><pre>${esc(JSON.stringify(brand, null, 2))}</pre></div>`;

      console.log('[TEST UPK OK]', { brand, data, debug });
    }

    // Auto-run 8n66ly al abrir; ?upk= para otro código
    (function init() {
      const p = new URLSearchParams(location.search);
      const upk = p.get('upk') || '8n66ly';
      document.getElementById('upkInput').value = upk;
      runTest();
    })();
  </script>
</body>
</html>
