  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Log bundle errors to console only (no on-screen overlay).
  window.addEventListener('error', function(e) {
    console.error('[bundle]', e.message || e.type, e.filename ? e.filename.slice(0, 60) + ':' + e.lineno : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2);border-radius:16px;padding:clamp(20px,4vw,30px)\">\n          <p style=\"margin:0 0 16px;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C6A15B\">{{ t.stackTitle }}<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ stackItems }}\" as=\"si\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:12px;align-items:baseline;justify-content:space-between\">\n                <span style=\"display:flex;gap:10px;align-items:baseline;font-size:14px;line-height:1.5;color:#DDD7C8\"><span style=\"color:#C6A15B;font-weight:700;flex-shrink:0\">✓<\u002Fspan>{{ si.text }}<\u002Fspan>\n                <span style=\"font-size:13px;color:#7B766A;text-decoration:line-through;flex-shrink:0;font-variant-numeric:tabular-nums\">{{ si.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:18px;padding-top:16px;border-top:1px solid rgba(198,161,91,.2)\">\n            <span style=\"font-size:14px;font-weight:700;color:#BFB9A8\">{{ t.stackTotalLbl }}<\u002Fspan>\n            <span style=\"display:flex;gap:14px;align-items:baseline\">\n              <span style=\"font-size:17px;color:#7B766A;text-decoration:line-through;font-variant-numeric:tabular-nums\">{{ stackTotal }}<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:700;color:#C6A15B\">{{ t.stackTodayLbl }} {{ priceLabel }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px\">\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center\">\n            <a href=\"{{ stripeUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ payBtnStyle }}\" style-hover=\"transform:translateY(-2px);box-shadow:0 16px 42px rgba(198,161,91,.45)\">{{ t.payStripe }}<\u002Fa>\n            <a href=\"{{ paypalUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"{{ paypalBtnStyle }}\" style-hover=\"transform:translateY(-2px);border-color:#C6A15B\">{{ t.payPaypal }}<\u002Fa>\n          <\u002Fdiv>\n          <p style=\"margin:0;font-size:12.5px;color:#7B766A\">{{ t.guarantee }}<\u002Fp>\n          <a href=\"Reporte Premium Eneagrama (standalone).html\" style=\"font-size:13px;color:#C6A15B;text-decoration:underline\">{{ t.seeSample }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ¿Ya pagaste? -->\n      <div style=\"margin-top:22px;background:rgba(22,24,34,.7);border:1px solid rgba(198,161,91,.16);border-radius:16px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap\">\n        <div>\n          <p style=\"margin:0 0 4px;font-size:14.5px;font-weight:700;color:#EFE9DA\">{{ t.afterPayT }}<\u002Fp>\n          <p style=\"margin:0;font-size:13px;line-height:1.55;color:#948F81;max-width:520px\">{{ t.afterPayD }}<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"Reporte Premium Eneagrama (standalone).html\" style=\"padding:12px 24px;border:1px solid rgba(198,161,91,.5);border-radius:99px;color:#C6A15B;font-size:13.5px;font-weight:700;text-decoration:none;white-space:nowrap;transition:background .15s ease\" style-hover=\"background:rgba(198,161,91,.12)\">{{ t.afterPayCta }} →<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center;margin-top:26px\">\n        <button onclick=\"{{ retake }}\" style=\"background:none;border:none;color:#7B766A;font-size:13.5px;cursor:pointer;text-decoration:underline;font-family:inherit\">{{ t.retake }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"padding:22px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:12px;color:#5E5A50;border-top:1px solid rgba(198,161,91,.12);position:relative;z-index:1;flex-wrap:wrap;text-align:center\">\n    <span>{{ t.footer }} · Ulpik<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;defaultLang&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;es&quot;, &quot;en&quot;], &quot;default&quot;: &quot;es&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;General&quot; },\n  &quot;price&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 5, &quot;min&quot;: 1, &quot;max&quot;: 49, &quot;step&quot;: 1, &quot;unit&quot;: &quot;USD&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;General&quot; },\n  &quot;stripeUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://buy.stripe.com/TU_ENLACE_AQUI&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Pagos&quot; },\n  &quot;paypalUrl&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://www.paypal.com/paypalme/TU_USUARIO/5&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Pagos&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    ready: false,\n    lang: \"es\",\n    screen: \"landing\",\n    page: 0,\n    answers: [],\n    leadName: \"\", leadEmail: \"\", leadPhone: \"\", leadCountry: \"+52\", leadTerms: false, leadError: false,\n  };\n\n  componentDidMount() {\n    import(window.__resources.enneaData).catch((e) => { console.error(\"enneaData import failed\", e); }).then((m) => {\n      this.data = m;\n      const lang = localStorage.getItem(\"ennea_lang\") || this.props.defaultLang || \"es\";\n      this.setState({ ready: true, lang });\n    });\n  }\n\n  setLang(lang) {\n    localStorage.setItem(\"ennea_lang\", lang);\n    this.setState({ lang });\n  }\n\n  answer(n, v) {\n    const answers = this.state.answers.slice();\n    answers[n] = v;\n    this.setState({ answers });\n    const p = this.state.page;\n    const done = [0, 1, 2, 3, 4, 5].every((j) => answers[p * 6 + j] != null);\n    if (done) {\n      clearTimeout(this._adv);\n      this._adv = setTimeout(() => {\n        if (this.state.page < 8) { this.setState({ page: this.state.page + 1 }); window.scrollTo(0, 0); }\n        else this.finish();\n      }, 450);\n    }\n  }\n\n  finish() {\n    const results = this.data.computeResults(this.state.answers);\n    const s = this.state;\n    const payload = {\n      name: s.leadName.trim(), email: s.leadEmail.trim(),\n      phone: s.leadCountry + \" \" + s.leadPhone.trim(),\n      lang: s.lang, results, date: new Date().toISOString(),\n    };\n    localStorage.setItem(\"ennea_results\", JSON.stringify(payload));\n    this._results = payload;\n    this.setState({ screen: \"report\" });\n    window.scrollTo(0, 0);\n  }\n\n  submitLead() {\n    const s = this.state;\n    const ok = s.leadName.trim() && /.+@.+\\..+/.test(s.leadEmail) && s.leadPhone.trim() && s.leadTerms;\n    if (!ok) { this.setState({ leadError: true }); return; }\n    this.setState({ screen: \"test\", page: 0, answers: [], leadError: false });\n    window.scrollTo(0, 0);\n  }\n\n  // Estrella del eneagrama con puntajes\n  buildChart(pct, primary) {\n    const R = 118, C = 150;\n    const ang = (t) => ((t * 40 - 90) * Math.PI) / 180;\n    const px = (t, r) => C + r * Math.cos(ang(t));\n    const py = (t, r) => C + r * Math.sin(ang(t));\n    const h = React.createElement;\n    const lines = [];\n    const hexad = [1, 4, 2, 8, 5, 7, 1];\n    for (let i = 0; i < 6; i++) lines.push(h(\"line\", { key: \"hx\" + i, x1: px(hexad[i], R), y1: py(hexad[i], R), x2: px(hexad[i + 1], R), y2: py(hexad[i + 1], R), stroke: \"#C6A15B\", strokeWidth: .6, opacity: .28 }));\n    const tri = [9, 3, 6, 9];\n    for (let i = 0; i < 3; i++) lines.push(h(\"line\", { key: \"tr\" + i, x1: px(tri[i], R), y1: py(tri[i], R), x2: px(tri[i + 1], R), y2: py(tri[i + 1], R), stroke: \"#C6A15B\", strokeWidth: .8, opacity: .42 }));\n    const poly = [];\n    for (let t = 1; t <= 9; t++) poly.push(px(t, (pct[t] / 100) * R).toFixed(1) + \",\" + py(t, (pct[t] / 100) * R).toFixed(1));\n    const dots = [];\n    for (let t = 1; t <= 9; t++) {\n      const main = t === primary;\n      dots.push(h(\"circle\", { key: \"d\" + t, cx: px(t, (pct[t] / 100) * R), cy: py(t, (pct[t] / 100) * R), r: main ? 6 : 3.5, fill: main ? \"#C6A15B\" : \"#8F7B4E\", stroke: main ? \"#F3EEE1\" : \"none\", strokeWidth: main ? 1.5 : 0 }));\n      dots.push(h(\"text\", { key: \"l\" + t, x: px(t, R + 18), y: py(t, R + 18) + 5, textAnchor: \"middle\", fontSize: 15, fontWeight: t === primary ? 800 : 500, fill: t === primary ? \"#C6A15B\" : \"#7B766A\", fontFamily: \"'Cormorant Garamond',Georgia,serif\" }, String(t)));\n    }\n    return h(\"svg\", { viewBox: \"0 0 300 300\", style: { width: \"min(320px, 80vw)\", height: \"auto\", display: \"block\" } },\n      h(\"circle\", { cx: C, cy: C, r: R, fill: \"none\", stroke: \"#C6A15B\", strokeWidth: 1, opacity: .5 }),\n      lines,\n      h(\"polygon\", { points: poly.join(\" \"), fill: \"rgba(198,161,91,.16)\", stroke: \"#C6A15B\", strokeWidth: 1.6, strokeLinejoin: \"round\" }),\n      dots\n    );\n  }\n\n  renderVals() {\n    const s = this.state;\n    const price = this.props.price ?? 5;\n    const priceLabel = \"$\" + price + \" USD\";\n    const gold = \"#C6A15B\";\n    const btnBase = \"padding:17px 36px;background:linear-gradient(135deg,#D8B96F,#B08A44);color:#171308;border:none;border-radius:99px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .15s ease, box-shadow .15s ease;box-shadow:0 10px 28px rgba(198,161,91,.3);\";\n    const toStyle = (css) => { const o = {}; css.split(\";\").forEach((r) => { const i = r.indexOf(\":\"); if (i > 0) o[r.slice(0, i).trim().replace(/-([a-z])/g, (m, c) => c.toUpperCase())] = r.slice(i + 1).trim(); }); return o; };\n\n    const base = {\n      isLanding: s.screen === \"landing\", isLead: s.screen === \"lead\",\n      isTest: s.screen === \"test\", isReport: s.screen === \"report\",\n      ctaStyle: toStyle(btnBase),\n      ctaWideStyle: toStyle(btnBase + \"width:100%;margin-top:4px;\"),\n      esBtnStyle: toStyle(this.langBtn(s.lang === \"es\")),\n      enBtnStyle: toStyle(this.langBtn(s.lang === \"en\")),\n      setEs: () => this.setLang(\"es\"),\n      setEn: () => this.setLang(\"en\"),\n      stripeUrl: this.props.stripeUrl ?? \"https://buy.stripe.com/TU_ENLACE_AQUI\",\n      paypalUrl: this.props.paypalUrl ?? \"https://www.paypal.com/paypalme/TU_USUARIO/5\",\n      t: {},\n    };\n    if (!this.data) return base;\n\n    const { UI, TYPES, COUNTRIES, itemAt, STRESS, GROWTH } = this.data;\n    const t = UI[s.lang];\n    base.t = t;\n\n    // Landing\n    base.start = () => { this.setState({ screen: \"lead\" }); window.scrollTo(0, 0); };\n\n    // Lead\n    base.leadName = s.leadName; base.leadEmail = s.leadEmail; base.leadPhone = s.leadPhone;\n    base.leadCountry = s.leadCountry; base.leadTerms = s.leadTerms; base.leadError = s.leadError;\n    base.onName = (e) => this.setState({ leadName: e.target.value, leadError: false });\n    base.onEmail = (e) => this.setState({ leadEmail: e.target.value, leadError: false });\n    base.onPhone = (e) => this.setState({ leadPhone: e.target.value, leadError: false });\n    base.onCountry = (e) => this.setState({ leadCountry: e.target.value });\n    base.onTerms = (e) => this.setState({ leadTerms: e.target.checked, leadError: false });\n    base.submitLead = () => this.submitLead();\n    base.countries = COUNTRIES;\n\n    // Test\n    const answered = s.answers.filter((v) => v != null).length;\n    base.pageNum = s.page + 1;\n    base.pctLabel = Math.round((answered / 54) * 100) + \"%\";\n    base.answeredLabel = answered + \" / 54\";\n    base.progressStyle = { height: \"100%\", width: Math.max(2, (answered / 54) * 100) + \"%\", background: \"linear-gradient(90deg,#8F7B4E,#C6A15B)\", borderRadius: \"99px\", transition: \"width .35s ease\" };\n    const lkLabels = [t.lk0, t.lk1, t.lk2, t.lk3, t.lk4];\n    base.items = [0, 1, 2, 3, 4, 5].map((j) => {\n      const n = s.page * 6 + j;\n      const it = itemAt(s.page, j);\n      const val = s.answers[n];\n      const sizes = [18, 24, 30, 24, 18];\n      return {\n        text: it.item[s.lang],\n        rowStyle: {\n          padding: \"18px 20px\", borderRadius: \"16px\",\n          background: val != null ? \"rgba(198,161,91,.08)\" : \"rgba(22,24,34,.85)\",\n          border: \"1px solid \" + (val != null ? \"rgba(198,161,91,.45)\" : \"rgba(198,161,91,.14)\"),\n          transition: \"all .2s ease\",\n        },\n        opts: [0, 1, 2, 3, 4].map((v) => ({\n          label: lkLabels[v],\n          pick: () => this.answer(n, v),\n          style: {\n            width: sizes[v] + \"px\", height: sizes[v] + \"px\", borderRadius: \"50%\", padding: 0, cursor: \"pointer\",\n            background: val === v ? gold : \"transparent\",\n            border: \"1.5px solid \" + (val === v ? gold : \"rgba(198,161,91,.4)\"),\n            boxShadow: val === v ? \"0 0 14px rgba(198,161,91,.5)\" : \"none\",\n            transition: \"all .15s ease\", flexShrink: 0, alignSelf: \"center\",\n          },\n        })),\n      };\n    });\n    base.goBack = () => { if (s.page > 0) { this.setState({ page: s.page - 1 }); window.scrollTo(0, 0); } else this.setState({ screen: \"lead\" }); };\n    base.backStyle = { background: \"none\", border: \"none\", color: \"#948F81\", fontSize: \"13.5px\", cursor: \"pointer\", fontFamily: \"inherit\", padding: 0 };\n\n    // Report\n    const res = this._results || (localStorage.getItem(\"ennea_results\") ? JSON.parse(localStorage.getItem(\"ennea_results\")) : null);\n    if (res) {\n      const r = res.results;\n      const type = TYPES[r.primary];\n      base.greeting = (s.lang === \"es\" ? \"Hola, \" : \"Hello, \") + (res.name.split(\" \")[0] || \"\") + \" — \" + t.repIs;\n      base.primaryNum = String(r.primary);\n      base.primaryName = type.name[s.lang];\n      base.primaryEssence = type.essence[s.lang];\n      base.wound = type.wound[s.lang];\n      base.blindspot = type.blindspot[s.lang];\n      base.enneaChart = this.buildChart(r.pct, r.primary);\n      const maxPct = Math.max(...Object.values(r.pct), 1);\n      base.chartRows = [];\n      for (let ty = 1; ty <= 9; ty++) {\n        const main = ty === r.primary;\n        base.chartRows.push({\n          n: String(ty),\n          pctLabel: r.pct[ty] + \"%\",\n          numStyle: { fontFamily: \"'Cormorant Garamond',Georgia,serif\", fontSize: \"17px\", fontWeight: main ? 800 : 500, color: main ? gold : \"#7B766A\", textAlign: \"center\" },\n          barStyle: { height: \"100%\", width: Math.max(3, (r.pct[ty] / maxPct) * 100) + \"%\", background: main ? \"linear-gradient(90deg,#8F7B4E,#D8B96F)\" : \"rgba(198,161,91,.35)\", borderRadius: \"6px\", transition: \"width .8s cubic-bezier(.2,.7,.3,1)\" },\n        });\n      }\n      const es = s.lang === \"es\";\n      base.teasers = [\n        { label: t.repWingLbl, value: (es ? \"Ala \" : \"Wing \") + r.wing + \" · \" + TYPES[r.wing].name[s.lang], blurred: es ? \"Tu ala matiza tu eneatipo con rasgos que explican por qué no encajas del todo en las descripciones típicas de tu número.\" : \"Your wing shades your type with traits that explain why typical descriptions never quite fit you.\" },\n        { label: t.repStressLbl + \" \" + r.stress, value: TYPES[r.stress].name[s.lang], blurred: es ? \"Bajo presión adoptas los rasgos bajos de este eneatipo. Reconocer la señal a tiempo es la clave para frenarlo.\" : \"Under pressure you adopt this type's low traits. Catching the signal early is the key to stopping it.\" },\n        { label: t.repGrowthLbl + \" \" + r.growth, value: TYPES[r.growth].name[s.lang], blurred: es ? \"En tu estado de centramiento accedes a los dones de este eneatipo. Es tu dirección de evolución consciente.\" : \"In your centered state you access this type's gifts. It is your direction of conscious evolution.\" },\n      ];\n    }\n\n    // Upsell\n    base.stackItems = t.stack.map((x) => ({ text: x.t, value: \"$\" + x.v }));\n    base.stackTotal = \"$\" + t.stack.reduce((a, x) => a + x.v, 0) + \" USD\";\n    base.priceLabel = priceLabel;\n    base.payBtnStyle = toStyle(btnBase + \"text-decoration:none;display:inline-block;\");\n    base.paypalBtnStyle = toStyle(\"padding:17px 36px;background:transparent;color:#C6A15B;border:1.5px solid rgba(198,161,91,.5);border-radius:99px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;transition:transform .15s ease, border-color .15s ease;\");\n    base.retake = () => { this.setState({ screen: \"test\", page: 0, answers: [] }); window.scrollTo(0, 0); };\n\n    return base;\n  }\n\n  langBtn(active) {\n    return \"padding:6px 14px;border-radius:99px;border:none;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;\" +\n      (active ? \"background:#C6A15B;color:#171308;\" : \"background:transparent;color:#948F81;\");\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
</script>
