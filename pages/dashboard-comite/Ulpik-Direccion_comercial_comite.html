<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulpik — Dirección Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --orange:#ff2500;--teal:#00adb0;--purple:#823bda;--dark:#222222;--cream:#f8ede2;
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efeb;--border:rgba(34,34,34,0.10);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9e9e9e;
  --green:#16a34a;--warn:#c07800;--radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --d-bg:#111111;--d-card:#1c1c1c;--d-card2:#252525;
  --d-border:rgba(255,255,255,0.07);--d-text:#e8e0d8;--d-muted:#7a7068;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
.topbar{position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 28px;height:52px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);gap:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:28px;height:28px;border-radius:6px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.brand-title{font-size:13px;font-weight:500;color:#fff;}
.brand-sep{color:rgba(255,255,255,.20);margin:0 3px;}
.brand-sub{font-size:11px;color:rgba(255,255,255,.40);}
.brand-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.10);}
.sem-select{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:5px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);cursor:pointer;outline:none;}
.sem-select:hover{background:rgba(255,255,255,.14);}
.sem-select option{background:#2a2a2a;color:#fff;}
.lbar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--orange);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;}
.lbar.on{transform:scaleX(0.7);}
.lbar.done{transform:scaleX(1);transition:transform .2s,opacity .3s .15s;opacity:0;}
.sec-nav{position:sticky;top:52px;z-index:200;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none;}
.sec-nav::-webkit-scrollbar{display:none;}
.snav-btn{font-family:inherit;font-size:11px;padding:8px 14px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.38);white-space:nowrap;transition:color .15s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.snav-btn:hover{color:rgba(255,255,255,.65);}
.snav-btn.active{color:#fff;font-weight:500;border-bottom-color:var(--orange);}
.main-wrap{padding:20px 28px 70px;max-width:1440px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.card-note{font-size:11px;color:var(--text3);margin-bottom:12px;}
.segment{margin-bottom:26px;scroll-margin-top:110px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.seg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.seg-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}
.seg-dot{width:7px;height:7px;border-radius:50%;}
.seg-title{font-size:13px;font-weight:600;color:var(--text);}
.seg-meta{font-size:11px;color:var(--text3);margin-left:auto;}
.triple-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:stretch;}
.triple-row .card{display:flex;flex-direction:column;}
.kpi-strip-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.kpi-4-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.kpi-4-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.kpi-4-card.c-orange::before{background:var(--orange);}
.kpi-4-card.c-teal::before{background:var(--teal);}
.kpi-4-card.c-purple::before{background:var(--purple);}
.kpi-4-card.c-green::before{background:var(--green);}
.kpi-4-card.c-warn::before{background:var(--warn);}
.kpi-4-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.kpi-4-val{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1;}
.kpi-4-sub{font-size:11px;color:var(--text2);margin-top:6px;}
.kpi-4-sub2{font-size:10px;color:var(--text3);margin-top:2px;}
.kpi-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.num-sm{font-size:14px;font-weight:600;}
.num-md{font-size:18px;font-weight:500;letter-spacing:-.2px;}
.num-lg{font-size:20px;font-weight:500;letter-spacing:-.3px;}
.pbar{height:6px;background:var(--bg3);border-radius:3px;margin:6px 0 3px;overflow:hidden;border:1px solid var(--border);}
.pbar-fill{height:100%;border-radius:3px;}
.si{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.si:last-child{border-bottom:none;}
.si-l{font-size:12px;color:var(--text2);}
.si-r{font-size:12px;font-weight:600;}
.divider{height:1px;background:var(--border);margin:12px 0;}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;letter-spacing:.02em;}
.chip-o{background:rgba(255,37,0,.10);color:var(--orange);}
.chip-t{background:rgba(0,173,176,.10);color:var(--teal);}
.chip-p{background:rgba(130,59,218,.10);color:var(--purple);}
.chip-g{background:rgba(22,163,74,.12);color:#15803d;}
.chip-w{background:rgba(255,165,0,.12);color:var(--warn);}
.chip-d{background:var(--dark);color:rgba(255,255,255,.7);}
.alert-box{background:rgba(255,37,0,.04);border:1px solid rgba(255,37,0,.20);border-radius:8px;padding:11px 14px;}
.info-box{background:rgba(130,59,218,.04);border:1px solid rgba(130,59,218,.18);border-radius:8px;padding:11px 14px;}
.warn-box{background:rgba(255,165,0,.05);border:1px solid rgba(255,165,0,.22);border-radius:8px;padding:11px 14px;}
.highlight-box{background:linear-gradient(135deg,rgba(22,163,74,.06),rgba(0,173,176,.06));border:1px solid rgba(22,163,74,.25);border-radius:8px;padding:11px 14px;}
.a-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.a-body{font-size:11px;color:var(--text2);line-height:1.55;}
.co{color:var(--orange);}.ct{color:var(--teal);}.cp{color:var(--purple);}.cs{color:var(--text3);}.cg{color:var(--green);}.cw{color:var(--warn);}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:block;}
.data-table{width:100%;border-collapse:collapse;}
.data-table thead tr{border-bottom:1px solid var(--border);}
.data-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:4px 10px 8px;text-align:left;}
.data-table th.r,.data-table td.r{text-align:right;}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.data-table tr:last-child td{border-bottom:none;}
.data-table td.r{font-weight:600;}
.data-table tbody tr:hover td{background:var(--bg3);}
.t-total td{background:var(--bg3)!important;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);}
.ibar{display:flex;align-items:center;gap:8px;}
.ibar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border);flex:1;min-width:50px;}
.ibar-fill{height:100%;border-radius:3px;}
.ibar-val{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:70px;text-align:right;font-family:'DM Mono',monospace;}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.funnel-label{font-size:12px;color:var(--text2);width:140px;flex-shrink:0;}
.funnel-track{flex:1;height:26px;background:var(--bg3);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.funnel-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 10px;min-width:40px;}
.funnel-fill span{font-size:11px;font-weight:600;white-space:nowrap;}
.funnel-arrow{font-size:11px;color:var(--text3);margin:2px 0 4px;padding-left:150px;}
.emb-section{background:var(--d-bg);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.05);}
.emb-inner{display:grid;grid-template-columns:1fr 1fr;}
.funnel-panel{padding:28px 32px 36px;border-right:1px solid var(--d-border);position:relative;overflow:hidden;}
.funnel-panel:last-child{border-right:none;}
.funnel-panel.marcas::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,37,0,.16) 0%,transparent 70%);pointer-events:none;}
.funnel-panel.priv::before{content:'';position:absolute;top:-80px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(0,173,176,.16) 0%,transparent 70%);pointer-events:none;}
.campaign-tag{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:10px;font-weight:500;}
.marcas .campaign-tag{background:rgba(255,37,0,.12);color:var(--orange);border:1px solid rgba(255,37,0,.25);}
.priv .campaign-tag{background:rgba(0,173,176,.12);color:var(--teal);border:1px solid rgba(0,173,176,.25);}
.campaign-tag .dot{width:6px;height:6px;border-radius:50%;}.marcas .campaign-tag .dot{background:var(--orange);}.priv .campaign-tag .dot{background:var(--teal);}
.emb-title{font-size:16px;font-weight:700;color:var(--cream);margin-bottom:4px;}
.emb-sub{font-size:12px;color:var(--d-muted);line-height:1.5;}
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0;}
.d-kpi-card{background:var(--d-card);border:1px solid var(--d-border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;}
.d-kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.marcas .d-kpi-card::after{background:linear-gradient(90deg,var(--orange),transparent);}
.priv .d-kpi-card::after{background:linear-gradient(90deg,var(--teal),transparent);}
.d-kpi-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);margin-bottom:4px;}
.d-kpi-value{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--cream);}
.marcas .d-kpi-value.accent{color:var(--orange);}.priv .d-kpi-value.accent{color:var(--teal);}
.d-kpi-sub{font-size:10px;color:var(--d-muted);margin-top:2px;}
.roas-banner{border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.marcas .roas-banner{background:linear-gradient(135deg,rgba(255,37,0,.08),rgba(130,59,218,.08));border:1px solid rgba(255,37,0,.2);}
.priv .roas-banner{background:linear-gradient(135deg,rgba(0,173,176,.08),rgba(130,59,218,.08));border:1px solid rgba(0,173,176,.2);}
.roas-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);}
.roas-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
.marcas .roas-val{color:var(--orange);}.priv .roas-val{color:var(--teal);}
.roas-revenue{font-family:'DM Mono',monospace;font-size:14px;color:var(--cream);}
.roas-sub{font-size:11px;color:var(--d-muted);}
.d-funnel-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--d-muted);margin-bottom:12px;}
.d-stage{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.d-stage-meta{min-width:155px;}
.d-stage-name{font-size:12px;font-weight:600;color:var(--cream);display:block;}
.d-stage-bar-bg{height:36px;background:var(--d-card2);border-radius:6px;overflow:hidden;flex:1;}
.d-stage-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:12px;min-width:36px;}
.marcas .d-stage-bar-fill{background:linear-gradient(90deg,#ff2500,#ff6040);}
.priv .d-stage-bar-fill{background:linear-gradient(90deg,#00adb0,#00d4d8);}
.d-stage-bar-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);font-family:'DM Mono',monospace;}
.d-conv-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;margin:0 0 5px 167px;}
.marcas .d-conv-badge{background:rgba(255,37,0,.12);color:var(--orange);}
.priv .d-conv-badge{background:rgba(0,173,176,.12);color:var(--teal);}
.d-divider{border:none;border-top:1px solid var(--d-border);margin:20px 0;}
.d-chart-wrap{background:var(--d-card);border:1px solid var(--d-border);border-radius:10px;padding:16px 16px 12px;margin-bottom:14px;}
.d-chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.d-chart-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);}
.d-legend{display:flex;gap:10px;flex-wrap:wrap;}
.d-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--d-muted);}
.d-leg-dot{width:7px;height:7px;border-radius:50%;}
.panel-note{margin-top:14px;font-size:11px;color:var(--d-muted);background:var(--d-card);padding:10px 13px;border-radius:0 6px 6px 0;line-height:1.55;}
.marcas .panel-note{border-left:3px solid rgba(255,37,0,.4);}
.priv .panel-note{border-left:3px solid rgba(0,173,176,.4);}
.evo-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.evo-cell{text-align:center;padding:8px 4px;border-radius:6px;}
.evo-cell.best{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.22);}
.evo-cell.warn{background:rgba(192,120,0,.05);border:1px solid rgba(192,120,0,.22);}
.evo-cell.neutral{background:var(--bg3);border:1px solid var(--border);}
.evo-period{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:2px;}
.evo-val{font-size:13px;font-weight:700;}
.evo-pct{font-size:9px;margin-top:1px;}
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;text-align:center;background:var(--bg3);border-radius:8px;border:1px dashed var(--border);}
.no-data-icon{font-size:24px;margin-bottom:8px;opacity:.5;}
.no-data-text{font-size:11px;color:var(--text3);}
.no-data-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;}
.tf-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.tf-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.38);white-space:nowrap;}
.tf-input{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid rgba(255,255,255,.14);border-radius:5px;background:rgba(255,255,255,.06);color:#fff;outline:none;width:106px;letter-spacing:.04em;}
.tf-input::placeholder{color:rgba(255,255,255,.22);}
.tf-input:focus{border-color:var(--orange);background:rgba(255,255,255,.10);}
.tf-sep{font-size:11px;color:rgba(255,255,255,.25);}
.tf-btn{font-family:inherit;font-size:10px;font-weight:700;padding:4px 12px;border-radius:5px;border:none;cursor:pointer;transition:opacity .15s;letter-spacing:.02em;white-space:nowrap;}
.tf-btn.apply{background:var(--orange);color:#fff;}
.tf-btn.apply:hover{opacity:.82;}
.tf-btn.clear{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12);}
.tf-btn.clear:hover{background:rgba(255,255,255,.14);}
.tf-status{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.38);white-space:nowrap;}
.tf-status.active{color:var(--orange);}
.tf-err{font-size:10px;color:#ff6b4a;white-space:nowrap;}
.no-date-notice{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(192,120,0,.07);border:1px solid rgba(192,120,0,.22);border-radius:8px;margin-bottom:14px;}
.no-date-notice.visible{display:flex;}
.no-date-notice-icon{font-size:16px;}
.no-date-notice-text{font-size:11px;color:var(--warn);line-height:1.4;}
[data-fecha]{transition:opacity .1s;}
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">U</div>
    <span class="brand-title">Ulpik</span>
    <span class="brand-sep">/</span>
    <span class="brand-sub">Dirección Comercial</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <select class="sem-select" id="semSelect" onchange="loadData(this.value)">
      <option>Cargando...</option>
    </select>
    <div class="brand-badge" id="semBadge">—</div>
    <div class="tf-wrap">
      <span class="tf-label">📅 Rango</span>
      <input type="text" class="tf-input" id="tfFrom" placeholder="dd/mm/aaaa" maxlength="10" autocomplete="off">
      <span class="tf-sep">→</span>
      <input type="text" class="tf-input" id="tfTo" placeholder="dd/mm/aaaa" maxlength="10" autocomplete="off">
      <button type="button" class="tf-btn apply" onclick="applyGlobalFilter()">Aplicar</button>
      <button type="button" class="tf-btn clear" id="tfClearBtn" onclick="clearGlobalFilter()" style="display:none;">✕ Limpiar</button>
      <span class="tf-status" id="tfStatus"></span>
      <span class="tf-err" id="tfErr" style="display:none;">Formato inválido</span>
    </div>
  </div>
</div>

<div class="sec-nav">
  <button class="snav-btn active" onclick="navTo('s-kpi',this)">KPIs</button>
  <button class="snav-btn" onclick="navTo('s-budgets',this)">Presupuestos</button>
  <button class="snav-btn" onclick="navTo('s-asesores',this)">Asesores</button>
  <button class="snav-btn" onclick="navTo('s-evo',this)">Evolutivo</button>
  <button class="snav-btn" onclick="navTo('s-embudos',this)">Embudos</button>
  <button class="snav-btn" onclick="navTo('s-convenio',this)">Convenio</button>
  <button class="snav-btn" onclick="navTo('s-upsell',this)">Upsell</button>
  <button class="snav-btn" onclick="navTo('s-disc',this)">Taller DISC</button>
  <button class="snav-btn" onclick="navTo('s-pi',this)">Test PI</button>
  <button class="snav-btn" onclick="navTo('s-legal',this)">Ventas LEGAL</button>
</div>

<div class="main-wrap">
  <div id="s-kpi"      class="segment"></div>
  <div id="s-budgets"  class="segment"></div>
  <div id="s-asesores" class="segment"></div>
  <div id="s-evo"      class="segment"></div>
  <div id="s-embudos"  class="segment"></div>
  <div id="s-convenio" class="segment"></div>
  <div id="s-upsell"   class="segment"></div>
  <div id="s-disc"     class="segment"></div>
  <div id="s-pi"       class="segment"></div>
  <div id="s-legal"    class="segment"></div>
</div>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  ⚙  CONFIGURACIÓN                              ║
// ║  Apps Script: direccion-comercial-apps-script.gs ║

function yearFromData(d){
  const sid=String(d?.semana_actual||'');
  const m=sid.match(/(\d{4})/);
  if(m)return+m[1];
  const hist=(d?.historico_mensual||[]).slice(-1)[0];
  const hm=hist?.label?.match(/(\d{4})/);
  if(hm)return+hm[1];
  return new Date().getFullYear();
}
function fechaAttr(f,year){
  if(!f)return '';
  const s=String(f).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
  if(!m)return s;
  const y=m[3]||year||new Date().getFullYear();
  return `${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}/${y}`;
}
function filterActive(){

// ── FETCH (JSONP — evita CORS desde GitHub Pages) ─
let _jsonpSeq = 0;
function fetchJsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_ulpikCom_' + (++_jsonpSeq) + '_' + Math.random().toString(36).slice(2, 9);
    let settled = false;
    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Timeout cargando datos'));
    }, 60000);
    const script = document.createElement('script');
    function cleanup() {
      clearTimeout(timer);
      window[cb] = function () {};
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve(data);
    };
    script.onerror = () => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('No se pudo conectar con Apps Script'));
    };
    const sep = url.includes('?') ? '&' : '?';
    script.src = url + sep + 'callback=' + encodeURIComponent(cb);
    document.head.appendChild(script);
  });
}

function acumuladoText(d, c) {
  const hist = d.historico_mensual || [];
  const sid = String(d.semana_actual || '');
  const parts = sid.split('-');
  if (parts.length < 2) return '';
  const mes = +parts[0], anio = +parts[1];
  let acumLegal = 0, acumPriv = 0;
  hist.forEach(h => {
    const m = (h.label || '').match(/(\w+)\s+(\d{4})/);
    if (!m || +m[2] !== anio) return;
    const mo = Object.entries(MESES).find(([, v]) => v === m[1]);
    const moNum = mo ? +mo[0] : 0;
    if (moNum && moNum <= mes) {
      acumLegal += Number(h.legal || 0);
      acumPriv += Number(h.priv || 0);
    }
  });
  const prev = hist.length > 1 ? hist[hist.length - 2] : null;
  const prevTot = prev ? Number(prev.legal || 0) + Number(prev.edu || 0) + Number(prev.priv || 0) : 0;
  const mesName = MESES[mes] || mes;
  let s = `Acum. ${mesName.toLowerCase()} legal: ${fmt(acumLegal)}`;
  if (acumPriv > 0) s += ` · Priv ${mesName.toLowerCase()}: ${fmt(acumPriv)}`;
  if (prevTot > 0) s += ` · vs ${prev.label} cierre: ${fmt(prevTot)}`;
  return s;
}

function comparativoNote(hist, sid) {
  if (!hist.length) return 'Evolución histórica de ingresos legales y educación';
  const parts = sid.split('-');
  const mes = parts[0] ? +parts[0] : 0;
  const anio = parts[1] ? +parts[1] : 0;
  const cur = hist[hist.length - 1];
  const prev = hist.length > 1 ? hist[hist.length - 2] : null;
  const yoy = hist.find(h => {
    const m = (h.label || '').match(/(\w+)\s+(\d{4})/);
    if (!m || +m[2] !== anio - 1) return false;
    const mo = Object.entries(MESES).find(([, v]) => v === m[1]);
    return mo && +mo[0] === mes;
  });
  const labels = [cur?.label + ' (actual)', prev?.label, yoy?.label].filter(Boolean);
  return labels.length ? labels.join(' vs ') : 'Evolución histórica de ingresos legales y educación';
}

function filterDataForWeek(d, semanaId) {
  const sid = semanaId || d.semana_actual;
  if (!sid) return d;
  return {
    ...d,
    semana_actual: sid,
    ventas: (d.ventas || []).filter(v => !v.semana_id || v.semana_id === sid),
  };
}

async function loadData(semana){
  loadBar(true);
  try{
    const url=APPS_SCRIPT_URL+(semana?'?semana='+encodeURIComponent(semana):'');
    const raw=await fetchJsonp(url);
    if(raw.error)throw new Error(raw.error);
    const data=filterDataForWeek(raw,semana||raw.semana_actual);
    updateSelector(data.semanas,data.semana_actual);
    renderAll(data);
  }catch(e){
    $('s-kpi').innerHTML=`<div style="padding:20px;background:rgba(255,37,0,.05);border:1px solid rgba(255,37,0,.2);border-radius:10px;color:var(--orange);">
      <strong>Error de conexión</strong><br><span style="font-size:11px;color:var(--text2);">${e.message}</span></div>`;
  }finally{loadBar(false);}
}

function updateSelector(semanas,actual){
  const sel=$('semSelect');
  const sorted=[...(semanas||[])].reverse();
  sel.innerHTML=sorted.map(s=>`<option value="${s.semana_id}"${s.semana_id===actual?' selected':''}>${s.label}</option>`).join('');
  sel.value=actual||'';
  const cur=(semanas||[]).find(s=>s.semana_id===actual);
  $('semBadge').textContent=cur?.badge||actual||'—';
}

// ── CÓMPUTOS ──────────────────────────────────────
function compute(d){
  const v=d.ventas||[], vSem=d.ventas_semana||v, ch=d.chats||{}, edu=d.educacion||{}, pp=d.priv_pagos||[], ps=d.priv_stats||{}, m=d.metas||{};
  const vMarcas=v.filter(x=>x.categoria==='Marcas');
  const vMarcasSem=vSem.filter(x=>x.categoria==='Marcas');
  const totalM=sumF(vMarcasSem,'monto');
  const totalLegal=sumF(v,'monto');
  const totalEdu=Number(edu.monto||0), totalPriv=sumF(pp,'monto');
  const total=totalLegal+totalEdu+totalPriv;
  const metaM=Number(m.meta_marcas||0), metaE=Number(m.meta_edu||0);
  const pctM=metaM>0?totalM/metaM*100:null;
  const pctE=metaE>0?totalEdu/metaE*100:null;
  const semanaRango=d.semana_rango||'';

  // Ads — filter zero rows; gasto semanal si hay rango
  const adsClean=(d.ads||[]).filter(a=>a.gasto>0||a.conv_wpp>0||a.clics>0);
  const adsSem=semanaRango?adsInRange(adsClean,semanaRango):adsClean;

  // Per asesor (semana en curso)
  const names=[...new Set([...vSem.map(x=>x.asesor).filter(Boolean)])];
  const ad={};
  names.forEach(a=>{
    const av=vSem.filter(x=>x.asesor===a), avm=av.filter(x=>x.categoria==='Marcas');
    const monto=sumF(av,'monto'), nc=Number(ch[a]||0);
    ad[a]={monto,ventas:av.length,ventasMarcas:avm.length,chats:nc,
      conv:nc>0?(avm.length/nc*100).toFixed(2):null,
      ticket:av.length>0?(monto/av.length).toFixed(2):0,
      pct:totalM>0?(monto/totalM*100).toFixed(1):0};
  });
  const maxM=Math.max(...names.map(a=>ad[a].monto),1);

  // Días de la semana en curso (marcas)
  const diasMap={};
  vMarcasSem.forEach(x=>{diasMap[x.fecha]=(diasMap[x.fecha]||0)+Number(x.monto||0);});
  const dias=Object.keys(diasMap).sort((a,b)=>new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-')));

  // Productos (mes completo para tabla legal)
  const prodMap={};
  v.forEach(x=>{if(!prodMap[x.producto])prodMap[x.producto]={ventas:0,monto:0};prodMap[x.producto].ventas++;prodMap[x.producto].monto+=Number(x.monto||0);});

  // DISC agrupado
  const discMap={};
  (d.disc||[]).forEach(row=>{
    const k=String(row.mes||'—');
    if(!discMap[k])discMap[k]={mes:MESES[parseInt(k)]||k,agendados:0,presentados:Number(row.presentados||0),ventas:Number(row.ventas||0)};
    else{discMap[k].presentados+=Number(row.presentados||0);discMap[k].ventas+=Number(row.ventas||0);}
    discMap[k].agendados++;
  });
  const discData=Object.values(discMap);

  return{v,vSem,ch,edu,pp,ps,m,vMarcas,vMarcasSem,totalM,totalLegal,totalEdu,totalPriv,total,metaM,metaE,pctM,pctE,names,ad,maxM,diasMap,dias,prodMap,adsClean,adsSem,discData,semanaRango};
}

function adsInRange(ads, rango) {
  const parts = String(rango).split('–').map(s => s.trim());
  if (parts.length < 2) return ads;
  const desde = tfParseDate(parts[0]);
  const hasta = tfParseDate(parts[1]);
  if (!desde || !hasta) return ads;
  return ads.filter(a => {
    const d = tfParseDate(a.fecha);
    return d && d >= desde && d <= hasta;
  });
}

function renderAll(d){
  _lastData=d;
  const c=compute(d);
  rKPIs(d,c);rPresupuestos(d,c);rAsesores(d,c);
  rEvolutivo(d);rEmbudos(d,c);
  rConvenio(d.convenio||{}, d.semana_actual||'');rUpsell(d.upsell||{});
  rDisc(c.discData);rPI(d.pi||{});rLegal(d,c);
  if(filterActive()) applyGlobalFilter();
}

// ══════════ §5 Asesores ══════════════════════════
function asesorNota(a,x){
  if(x.ventas===0) return 'Sin ventas esta semana';
  const otras=x.ventas-x.ventasMarcas;
  let s=`${x.ventasMarcas} marcas`;
  if(otras>0) s+=` + ${otras} otras`;
  if(x.chats>0) s+=` · ${x.chats} chats registrados`;
  return s;
}
function rAsesores(d,c){
  const{names,ad,maxM,totalLegal,v,m}=c;
  const meta=Number(m.meta_conv||5);
  const activos=names.filter(a=>ad[a].ventas>0).length;
  const rows=names.map(a=>{
    const x=ad[a];const bw=maxM>0?(x.monto/maxM*100).toFixed(1):0;
    return `<tr><td style="font-weight:600;${x.ventas===0?'color:var(--text3);':''}">${a}</td>
      <td><div class="ibar"><div class="ibar-track"><div class="ibar-fill" style="width:${bw}%;background:${colA(a)};"></div></div><span class="ibar-val">${fmt(x.monto)}</span></div></td>
      <td class="r" style="font-size:14px;font-weight:700;color:${x.ventas>0?colA(a):'var(--text3)'};">${x.ventas}</td>
      <td class="r" style="font-family:'DM Mono',monospace;">${x.ventas>0?fmt(x.ticket):'—'}</td>
      <td class="r" style="color:${x.ventas>0?colA(a):'var(--text3)'};">${x.pct}%</td>
      <td style="font-size:11px;color:var(--text3);">${asesorNota(a,x)}</td></tr>`;}).join('');

  const convAs=names.filter(a=>ad[a].chats>0);
  const convSection=convAs.length?`
    <div style="margin-top:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <div style="padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;font-weight:600;color:var(--text);">Conversión por asesor — Período cargado</span>
        <span style="font-size:10px;color:var(--text3);">Objetivo equipo: <strong style="color:var(--green);">${meta.toFixed(2)}%</strong></span></div>
      <div style="display:grid;grid-template-columns:repeat(${convAs.length},1fr);">
        ${convAs.map((a,i)=>{const x=ad[a];const cv=Number(x.conv||0);const over=cv>=meta;const col=over?'var(--green)':'var(--warn)';
          return `<div style="padding:14px 16px;${i<convAs.length-1?'border-right:1px solid var(--border);':''}">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:12px;font-weight:600;">${a}</span>
              <span style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:${col};">${cv}%</span></div>
            <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border);margin-bottom:6px;">
              <div style="width:${clamp(cv/30*100,0,100)}%;height:100%;background:${col};border-radius:3px;min-width:4px;"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);">
              <span>${x.ventasMarcas} ventas (marcas) / ${x.chats} chats</span>
              <span style="color:${col};font-weight:600;">${over?'✓ sobre meta':'⚠ bajo meta'}</span></div></div>`;}).join('')}
      </div>
      <div style="padding:8px 16px;background:var(--bg3);border-top:1px solid var(--border);font-size:10px;color:var(--text3);">
        Conversión calculada sobre ventas de <strong>Marcas</strong> vs. chats registrados en CONTACTADOS_LEGAL</div></div>`
    :`<div class="warn-box" style="margin-top:14px;"><div class="a-title" style="color:var(--warn);">Tasa de conversión no disponible</div>
      <div class="a-body">Carga los datos de CONTACTADOS LEGAL con columnas <strong>Mes y Año</strong>, <strong>Responsable</strong> y <strong>Chats</strong>.</div></div>`;

  const withSales=names.filter(a=>ad[a].ventas>0);
  const topChats=names.slice().sort((a,b)=>ad[b].chats-ad[a].chats)[0];
  const pcts=withSales.map(a=>+ad[a].pct);
  const spread=pcts.length>1?Math.max(...pcts)-Math.min(...pcts):0;
  const infoBox=withSales.length?`
    <div class="info-box" style="flex:1;">
      <div class="a-title" style="color:var(--purple);">📊 Distribución del equipo</div>
      <div class="a-body">${withSales.map(a=>`${a} (${ad[a].pct}%)`).join(', ')}${spread<30?' reparten el ingreso de forma equilibrada.':'.'}${topChats&&ad[topChats].chats>0?' '+topChats+' registró '+ad[topChats].chats+' chats — máxima actividad del equipo.':''}</div></div>`:'';
  const worstConv=convAs.filter(a=>Number(ad[a].conv||0)<meta).sort((a,b)=>Number(ad[a].conv||0)-Number(ad[b].conv||0))[0];
  const alertBox=worstConv?`
    <div class="alert-box" style="flex:1;">
      <div class="a-title" style="color:var(--orange);">⚠ Conversión ${worstConv}: ${ad[worstConv].conv}% — ${ad[worstConv].chats} chats · ${ad[worstConv].ventasMarcas} ventas marcas</div>
      <div class="a-body">${ad[worstConv].chats} contactos gestionados con ${ad[worstConv].ventasMarcas} cierres en marcas. Por debajo del objetivo ${meta.toFixed(2)}%.</div></div>`:'';

  $('s-asesores').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">05</span><span class="seg-dot" style="background:var(--teal);"></span>
    <span class="seg-title">Gestión Individual — Asesores Marcas</span><span class="seg-meta">Chats · Ventas · Monto · Participación</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin:0;">Rendimiento por asesor · Período cargado</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="chip chip-d">${activos} asesor${activos!==1?'es':''} activo${activos!==1?'s':''}</span>
        <span style="font-size:10px;color:var(--text3);">Total sem: <strong class="co">${fmt(totalLegal)}</strong></span></div></div>
    <table class="data-table">
      <thead><tr><th>Asesor</th><th>Monto período</th><th class="r">N° ventas</th><th class="r">Ticket prom.</th><th class="r">Participación</th><th>Nota</th></tr></thead>
      <tbody>${rows}
        <tr class="t-total"><td>TOTAL</td><td><span style="font-family:'DM Mono',monospace;font-size:12px;">${fmt(totalLegal)}</span></td>
          <td class="r co">${v.length}</td><td class="r" style="font-family:'DM Mono',monospace;font-size:12px;">${fmt(v.length>0?totalLegal/v.length:0)}</td>
          <td class="r cs">100%</td><td></td></tr></tbody></table>
    ${infoBox||alertBox?`<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">${infoBox}${alertBox}</div>`:''}
    ${convSection}</div>`;
}

// ══════════ §6 Evolutivo ═════════════════════════
function rEvolutivo(d){
  const evo=d.evolutivo||[];
  const curId=d.semana_actual;
  const curIdx=evo.findIndex(e=>e.semana_id===curId);
  const windowEvo=curIdx>=0?evo.slice(Math.max(0,curIdx-2),Math.min(evo.length,Math.max(0,curIdx-2)+6)):evo.slice(-6);
  const hasMeta=evo.some(e=>e.meta>0);

  const cells=windowEvo.map((e)=>{
    const isCur=e.semana_id===curId;
    const pv=hasMeta&&e.meta>0?e.ingresos/e.meta*100:null;
    const cls=isCur?'warn':pv===null?'neutral':pv>=100?'best':'warn';
    return `<div class="evo-cell ${cls}" style="${isCur?'border-color:rgba(255,37,0,.30);':''}">
      <div class="evo-period" style="${isCur?'color:var(--orange);font-weight:600;':''}">${e.label}${isCur?' ← actual':''}</div>
      <div class="evo-val ${pv===null?'cs':pv>=100?'cg':'co'}">${fmt(e.ingresos)}</div>
      ${pv!==null?`<div class="evo-pct ${pv>=100?'cg':'co'}">${pv.toFixed(1)}% ${pv>=100?'✓':'✗'}${isCur&&pv<100?' bajo meta':''}</div>`:''}
    </div>`;}).join('');

  $('s-evo').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">06</span><span class="seg-dot" style="background:var(--orange);"></span>
    <span class="seg-title">Evolutivo — Ingresos semana a semana</span><span class="seg-meta">${evo.length} períodos · viendo ${curId||'—'}</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="card-title" style="margin:0;">Ingresos totales · semana a semana</div>
      <div style="display:flex;gap:10px;">
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:10px;height:2px;background:var(--orange);display:inline-block;"></span>Ingresos</div>
        ${hasMeta?`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:10px;height:2px;background:var(--green);opacity:.5;display:inline-block;border-top:1px dashed;"></span>Meta</div>`:''}
      </div></div>
    <div style="position:relative;height:200px;"><canvas id="evoChart"></canvas></div>
    <div class="evo-mini" style="grid-template-columns:repeat(${windowEvo.length},1fr);">${cells}</div></div>`;

  killChart('evo');
  if(evo.length){
    const datasets=[{label:'Ingresos',data:evo.map(e=>e.ingresos),borderColor:'#ff2500',backgroundColor:'rgba(255,37,0,.07)',borderWidth:2,
      pointBackgroundColor:evo.map(e=>hasMeta&&e.meta>0?(e.ingresos>=e.meta?'#16a34a':'#ff2500'):'#ff2500'),pointRadius:3,tension:.35,fill:true}];
    if(hasMeta)datasets.push({label:'Meta',data:evo.map(e=>e.meta),borderColor:'rgba(22,163,74,.5)',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false});
    charts['evo']=new Chart($('evoChart').getContext('2d'),{
      type:'line',data:{labels:evo.map(e=>e.label),datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>' '+fmt(x.raw)}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#9e9e9e',maxTicksLimit:12}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#9e9e9e',callback:v=>'$'+v.toLocaleString()}}}}});
  }
}

function buildStg(id,cls,stages){
  const el=$(id);if(!el)return;
  const max=stages[0]?.val||1;
  el.innerHTML=stages.map((s,i)=>{
    const p=Math.max(s.val/max*100,3);
    return `<div class="d-stage"><div class="d-stage-meta"><span class="d-stage-name">${s.name}</span><span style="font-size:10px;color:var(--d-muted);">${s.sub}</span></div>
      <div class="d-stage-bar-bg"><div class="d-stage-bar-fill" style="width:${p}%;"><span class="d-stage-bar-label">${s.label}</span></div></div></div>
      ${i<stages.length-1&&s.conv?`<div class="d-conv-badge">${s.conv}</div>`:''}`}).join('');
}

// ══════════ §8 Convenio ══════════════════════════
const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fechaCorta(f) {
  const m = String(f || '').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!m) return f || '—';
  return `${+m[1]} ${MESES_CORTO[+m[2] - 1]} ${m[3]}`;
}
function mesSinActividadConvenio(ultima, semanaId) {
  const um = String(ultima || '').match(/\/(\d{1,2})\/(\d{4})$/);
  const sm = String(semanaId || '').match(/^(\d+)-(\d+)$/);
  if (!um || !sm) return '';
  const ultMes = +um[1], ultAnio = +um[2], curMes = +sm[1], curAnio = +sm[2];
  if (curAnio > ultAnio || (curAnio === ultAnio && curMes > ultMes)) {
    return (MESES[curMes] || curMes).toLowerCase();
  }
  return '';
}
function rConvenio(cv, semanaId) {
  const empty = !cv || !Number(cv.contactados);
  const ct = Number(cv.contactados || 0), re = Number(cv.respondieron || 0);
  const ll = Number(cv.llamadas || 0), co = Number(cv.convenios || 0);

  const pctLl = re > 0 ? (ll / re * 100).toFixed(1) : '0.0';
  const pctCo = ll > 0 ? (co / ll * 100).toFixed(1) : '0.0';
  const ultLabel = fechaCorta(cv.ultima_gestion);
  const mesInactivo = mesSinActividadConvenio(cv.ultima_gestion, semanaId);
  const sinActividad = !!mesInactivo;

  const funnel = empty ? '' : `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Contactados</div><div class="num-lg">${ct}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Respondieron</div><div class="num-lg co">${re}</div><div style="font-size:10px;color:var(--text3);">${pctRe}%</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Llamadas</div><div class="num-lg ct">${ll}</div><div style="font-size:10px;color:var(--text3);">${pctLl}%</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;background:rgba(0,173,176,.06);border-color:rgba(0,173,176,.20);"><div class="kpi-label ct">Convenios / proc.</div><div class="num-lg ct">${co}</div><div style="font-size:10px;color:var(--text3);">${pctCo}%</div></div></div>
    <div class="funnel-row"><span class="funnel-label">Contactados</span><div class="funnel-track"><div class="funnel-fill" style="width:100%;background:rgba(255,37,0,.12);"><span class="co">${ct}</span></div></div></div>
    <div class="funnel-arrow">↓ ${pctRe}% responden</div>
    <div class="funnel-row"><span class="funnel-label">Respondieron</span><div class="funnel-track"><div class="funnel-fill" style="width:${ct > 0 ? (re / ct * 100).toFixed(1) : 0}%;background:rgba(255,37,0,.22);"><span class="co">${re}</span></div></div></div>
    <div class="funnel-arrow">↓ ${pctLl}% llamada</div>
    <div class="funnel-row"><span class="funnel-label">Llamadas</span><div class="funnel-track"><div class="funnel-fill" style="width:${ct > 0 ? (ll / ct * 100).toFixed(1) : 0}%;background:rgba(0,173,176,.35);"><span class="ct">${ll}</span></div></div></div>
    <div class="funnel-arrow">↓ ${pctCo}% convenio</div>
    <div class="funnel-row"><span class="funnel-label">Convenio / Proc.</span><div class="funnel-track"><div class="funnel-fill" style="width:${ct > 0 ? (co / ct * 100).toFixed(1) : 0}%;background:var(--teal);"><span>${co}</span></div></div></div>
    ${cv.ultima_gestion ? `<div class="warn-box" style="margin-top:12px;">
      <div class="a-title" style="color:var(--warn);">${sinActividad ? `⏸ Sin actividad en ${mesInactivo}` : `Última gestión: ${ultLabel}`}</div>
      <div class="a-body">Última gestión: ${ultLabel}. ${co} diseñador${co !== 1 ? 'es' : ''} en proceso o con convenio firmado pendientes de activación.</div></div>` : ''}`;

  $('s-convenio').innerHTML = `
  <div class="seg-hdr"><span class="seg-num">08</span><span class="seg-dot" style="background:var(--teal);"></span>
    <span class="seg-title">Convenio Diseñadores — Histórico</span>
    <span class="seg-meta">${empty ? 'Sin datos' : sinActividad ? `Sin actividad · última gestión ${ultLabel}` : `Última gestión ${ultLabel}`}</span></div>
  <div class="card">
    <div class="no-date-notice" id="notice-convenio"><span class="no-date-notice-icon">📅</span><span class="no-date-notice-text">Esta sección muestra datos históricos sin granularidad de fecha — el filtro activo no aplica aquí.</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin:0;">Convenio Diseñadores</div>
      ${cv.ultima_gestion ? `<span class="chip chip-o">${sinActividad ? `Sin gestión desde ${ultLabel}` : `Última gestión ${ultLabel}`}</span>` : ''}</div>
    ${empty ? noData('Sin datos en GESTION CONVENIO DISEÑADORES', 'Verifica columnas: Contactados, Respuestas, Llamadas cerrad, Convenios') : funnel}
  </div>`;
}

function rDisc(discData){
  const tot=discData.reduce((s,d)=>s+d.agendados,0);
  const pres=discData.reduce((s,d)=>s+d.presentados,0);
  const vts=discData.reduce((s,d)=>s+d.ventas,0);
  const maxAg=Math.max(...discData.map(d=>d.agendados),1);
  const convPct=tot>0?(vts/tot*100).toFixed(1):0;
  const lastMes=discData.length?discData[discData.length-1]:null;

  $('s-disc').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">10</span><span class="seg-dot" style="background:var(--purple);"></span>

    `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Agendados total</div><div class="num-lg">${tot}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">${lastMes?lastMes.mes+' agendados':'Último mes'}</div><div class="num-lg cp">${lastMes?lastMes.agendados:0}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Se presentaron</div><div class="num-lg cw">${pres}</div><div style="font-size:10px;color:var(--text3);">histórico total</div></div>

      <div class="funnel-track"><div class="funnel-fill" style="width:${d.agendados/maxAg*100}%;background:rgba(130,59,218,.35);">
        <span class="cp">${d.agendados}</span></div></div></div>`).join('')}
    ${pres===0&&tot>0?`<div class="alert-box" style="margin-top:12px;"><div class="a-title" style="color:var(--orange);">⚠ Rotura de funnel — asistencia baja</div>
      <div class="a-body">Solo ${pres} de ${tot} agendados (${tot>0?(pres/tot*100).toFixed(1):0}%) se presentaron. Revisa el protocolo de confirmación pre-taller.</div></div>`
    :pres>0&&vts===0?`<div class="warn-box" style="margin-top:12px;"><div class="a-title" style="color:var(--warn);">⚠ Asistencia sin conversión</div>
      <div class="a-body">${pres} presentados sin ventas registradas. Verifica columna de ventas en TALLER DISC.</div></div>`:''}`
    }</div>`;
}

  {id:'s-upsell',noticeId:'notice-upsell'},
  {id:'s-disc',noticeId:'notice-disc'},
  {id:'s-pi',noticeId:'notice-pi'}
];

function tfParseDate(str){
  const m=(str||'').trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m)return null;
  const d=+m[1],mo=+m[2],y=+m[3];
  if(mo<1||mo>12||d<1||d>31)return null;
  return new Date(y,mo-1,d);
}

['tfFrom','tfTo'].forEach(id=>{
  const el=$(id);
  if(!el)return;
  el.addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'');
    if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
    if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
    if(v.length>10)v=v.slice(0,10);
    this.value=v;
  });
  el.addEventListener('keydown',e=>{if(e.key==='Enter')applyGlobalFilter();});
});

function applyGlobalFilter(){
  const fromVal=$('tfFrom')?.value||'';
  const toVal=$('tfTo')?.value||'';
  const errEl=$('tfErr'),statusEl=$('tfStatus'),clearBtn=$('tfClearBtn');
  errEl.style.display='none';

  const fromDate=fromVal.trim()?tfParseDate(fromVal):null;
  const toDate=toVal.trim()?tfParseDate(toVal):null;

  if((fromVal.trim()&&!fromDate)||(toVal.trim()&&!toDate)){
    errEl.style.display='inline';
    return;
  }

  const isActive=!!(fromDate||toDate);
  let totalVisible=0;

  document.querySelectorAll('[data-fecha]').forEach(el=>{
    if(el.classList.contains('t-total'))return;
    if(!isActive){el.style.display='';totalVisible++;return;}
    const fd=tfParseDate(el.dataset.fecha);
    let show=true;
    if(fd){
      if(fromDate&&fd<fromDate)show=false;
      if(toDate&&fd>toDate)show=false;
    }
    el.style.display=show?'':'none';
    if(show)totalVisible++;
  });

  UNDATED_SECTIONS.forEach(s=>{
    const notice=$(s.noticeId);
    if(notice)notice.classList.toggle('visible',isActive);
  });

  if(isActive){
    const parts=[];
    if(fromDate)parts.push(fromVal.trim());
    if(toDate)parts.push(toVal.trim());
    const rangeStr=parts.join(' → ');
    statusEl.textContent=rangeStr+' · '+totalVisible+' registro'+(totalVisible!==1?'s':'')+' visible'+(totalVisible!==1?'s':'');
    statusEl.className='tf-status active';
    clearBtn.style.display='inline-block';
  }else{
    statusEl.textContent='';
    statusEl.className='tf-status';
    clearBtn.style.display='none';
  }
}

function clearGlobalFilter(){
  const fromEl=$('tfFrom'),toEl=$('tfTo');
  if(fromEl)fromEl.value='';
  if(toEl)toEl.value='';
  $('tfErr').style.display='none';
  $('tfStatus').textContent='';
  $('tfStatus').className='tf-status';
  $('tfClearBtn').style.display='none';
  document.querySelectorAll('[data-fecha]').forEach(el=>el.style.display='');
  UNDATED_SECTIONS.forEach(s=>{
    const notice=$(s.noticeId);
    if(notice)notice.classList.remove('visible');
  });
}

// ── INIT ──────────────────────────────────────────
loadData();
</script>
