<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulpik — Dirección Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --orange:#ff2500;--teal:#00adb0;--purple:#823bda;--dark:#222222;--cream:#f8ede2;
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efeb;--border:rgba(34,34,34,0.10);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9e9e9e;
  --green:#16a34a;--warn:#c07800;--radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --d-bg:#111111;--d-card:#1c1c1c;--d-card2:#252525;
  --d-border:rgba(255,255,255,0.07);--d-text:#e8e0d8;--d-muted:#7a7068;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:28px;height:28px;border-radius:6px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.brand-title{font-size:13px;font-weight:500;color:#fff;}
.brand-sep{color:rgba(255,255,255,.20);margin:0 3px;}
.brand-sub{font-size:11px;color:rgba(255,255,255,.40);}
.brand-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.10);}
.sem-select{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:5px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);cursor:pointer;outline:none;transition:background .15s;}
.sem-select:hover{background:rgba(255,255,255,.14);}
.sem-select option{background:#2a2a2a;color:#fff;}
/* LOADING BAR */
.lbar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--orange);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;}
.lbar.on{transform:scaleX(0.7);}
.lbar.done{transform:scaleX(1);transition:transform .2s ease,opacity .3s ease .15s;opacity:0;}
/* NAV */
.sec-nav{position:sticky;top:52px;z-index:200;background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none;}
.sec-nav::-webkit-scrollbar{display:none;}
.snav-btn{font-family:inherit;font-size:11px;padding:8px 14px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.38);white-space:nowrap;transition:color .15s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.snav-btn:hover{color:rgba(255,255,255,.65);}
.snav-btn.active{color:#fff;font-weight:500;border-bottom-color:var(--orange);}
/* MAIN */
.main-wrap{padding:20px 28px 70px;max-width:1440px;margin:0 auto;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.card-note{font-size:11px;color:var(--text3);margin-bottom:12px;}
.segment{margin-bottom:26px;scroll-margin-top:110px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.seg-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.seg-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}
.seg-dot{width:7px;height:7px;border-radius:50%;}
.seg-title{font-size:13px;font-weight:600;color:var(--text);}
.seg-meta{font-size:11px;color:var(--text3);margin-left:auto;}
.triple-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:stretch;}
.triple-row .card{display:flex;flex-direction:column;}
.kpi-strip-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.kpi-4-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.kpi-4-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.kpi-4-card.c-orange::before{background:var(--orange);}
.kpi-4-card.c-teal::before{background:var(--teal);}
.kpi-4-card.c-purple::before{background:var(--purple);}
.kpi-4-card.c-green::before{background:var(--green);}
.kpi-4-card.c-warn::before{background:var(--warn);}
.kpi-4-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.kpi-4-val{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1;}
.kpi-4-sub{font-size:11px;color:var(--text2);margin-top:6px;}
.kpi-4-sub2{font-size:10px;color:var(--text3);margin-top:2px;}
.kpi-card{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.num-md{font-size:18px;font-weight:500;letter-spacing:-.2px;}
.num-lg{font-size:20px;font-weight:500;letter-spacing:-.3px;}
.pbar{height:6px;background:var(--bg3);border-radius:3px;margin:6px 0 3px;overflow:hidden;border:1px solid var(--border);}
.pbar-fill{height:100%;border-radius:3px;}
.si{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.si:last-child{border-bottom:none;}
.si-l{font-size:12px;color:var(--text2);}
.si-r{font-size:12px;font-weight:600;}
.divider{height:1px;background:var(--border);margin:12px 0;}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;letter-spacing:.02em;}
.chip-o{background:rgba(255,37,0,.10);color:var(--orange);}
.chip-t{background:rgba(0,173,176,.10);color:var(--teal);}
.chip-p{background:rgba(130,59,218,.10);color:var(--purple);}
.chip-g{background:rgba(22,163,74,.12);color:#15803d;}
.chip-w{background:rgba(255,165,0,.12);color:var(--warn);}
.chip-d{background:var(--dark);color:rgba(255,255,255,.7);}
.alert-box{background:rgba(255,37,0,.04);border:1px solid rgba(255,37,0,.20);border-radius:8px;padding:11px 14px;}
.info-box{background:rgba(130,59,218,.04);border:1px solid rgba(130,59,218,.18);border-radius:8px;padding:11px 14px;}
.warn-box{background:rgba(255,165,0,.05);border:1px solid rgba(255,165,0,.22);border-radius:8px;padding:11px 14px;}
.a-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.a-body{font-size:11px;color:var(--text2);line-height:1.55;}
.co{color:var(--orange);}.ct{color:var(--teal);}.cp{color:var(--purple);}.cs{color:var(--text3);}.cg{color:var(--green);}.cw{color:var(--warn);}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:block;}
.data-table{width:100%;border-collapse:collapse;}
.data-table thead tr{border-bottom:1px solid var(--border);}
.data-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:4px 10px 8px;text-align:left;}
.data-table th.r{text-align:right;}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.data-table tr:last-child td{border-bottom:none;}
.data-table td.r{text-align:right;font-weight:600;}
.data-table tbody tr:hover td{background:var(--bg3);}
.t-total td{background:var(--bg3)!important;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);}
.ibar{display:flex;align-items:center;gap:8px;}
.ibar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border);flex:1;min-width:50px;}
.ibar-fill{height:100%;border-radius:3px;}
.ibar-val{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:70px;text-align:right;font-family:'DM Mono',monospace;}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.funnel-label{font-size:12px;color:var(--text2);width:140px;flex-shrink:0;}
.funnel-track{flex:1;height:26px;background:var(--bg3);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.funnel-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 10px;min-width:40px;}
.funnel-fill span{font-size:11px;font-weight:600;white-space:nowrap;}
.funnel-arrow{font-size:11px;color:var(--text3);margin:2px 0 4px;padding-left:150px;}
/* EMBUDOS DARK */
.emb-section{background:var(--d-bg);border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,0.05);}
.emb-inner{display:grid;grid-template-columns:1fr 1fr;}
.funnel-panel{padding:28px 32px 36px;border-right:1px solid var(--d-border);position:relative;overflow:hidden;}
.funnel-panel:last-child{border-right:none;}
.funnel-panel.marcas::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,37,0,.16) 0%,transparent 70%);pointer-events:none;}
.funnel-panel.priv::before{content:'';position:absolute;top:-80px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(0,173,176,.16) 0%,transparent 70%);pointer-events:none;}
.campaign-tag{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:10px;font-weight:500;}
.marcas .campaign-tag{background:rgba(255,37,0,.12);color:var(--orange);border:1px solid rgba(255,37,0,.25);}
.priv .campaign-tag{background:rgba(0,173,176,.12);color:var(--teal);border:1px solid rgba(0,173,176,.25);}
.campaign-tag .dot{width:6px;height:6px;border-radius:50%;}
.marcas .campaign-tag .dot{background:var(--orange);}
.priv .campaign-tag .dot{background:var(--teal);}
.emb-title{font-size:16px;font-weight:700;color:var(--cream);margin-bottom:4px;}
.emb-sub{font-size:12px;color:var(--d-muted);line-height:1.5;}
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0;}
.d-kpi-card{background:var(--d-card);border:1px solid var(--d-border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;}
.d-kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.marcas .d-kpi-card::after{background:linear-gradient(90deg,var(--orange),transparent);}
.priv .d-kpi-card::after{background:linear-gradient(90deg,var(--teal),transparent);}
.d-kpi-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);margin-bottom:4px;}
.d-kpi-value{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--cream);}
.marcas .d-kpi-value.accent{color:var(--orange);}
.priv .d-kpi-value.accent{color:var(--teal);}
.d-kpi-sub{font-size:10px;color:var(--d-muted);margin-top:2px;}
.roas-banner{border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.marcas .roas-banner{background:linear-gradient(135deg,rgba(255,37,0,.08),rgba(130,59,218,.08));border:1px solid rgba(255,37,0,.2);}
.priv .roas-banner{background:linear-gradient(135deg,rgba(0,173,176,.08),rgba(130,59,218,.08));border:1px solid rgba(0,173,176,.2);}
.roas-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);}
.roas-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;}
.marcas .roas-val{color:var(--orange);}
.priv .roas-val{color:var(--teal);}
.roas-revenue{font-family:'DM Mono',monospace;font-size:14px;color:var(--cream);}
.roas-sub{font-size:11px;color:var(--d-muted);}
.d-funnel-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--d-muted);margin-bottom:12px;}
.d-stage{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.d-stage-meta{min-width:155px;}
.d-stage-name{font-size:12px;font-weight:600;color:var(--cream);display:block;}
.d-stage-bar-bg{height:36px;background:var(--d-card2);border-radius:6px;overflow:hidden;flex:1;}
.d-stage-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:12px;min-width:36px;}
.marcas .d-stage-bar-fill{background:linear-gradient(90deg,#ff2500,#ff6040);}
.priv .d-stage-bar-fill{background:linear-gradient(90deg,#00adb0,#00d4d8);}
.d-stage-bar-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);font-family:'DM Mono',monospace;}
.d-conv-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;margin:0 0 5px 167px;}
.marcas .d-conv-badge{background:rgba(255,37,0,.12);color:var(--orange);}
.priv .d-conv-badge{background:rgba(0,173,176,.12);color:var(--teal);}
.d-divider{border:none;border-top:1px solid var(--d-border);margin:20px 0;}
.d-chart-wrap{background:var(--d-card);border:1px solid var(--d-border);border-radius:10px;padding:16px 16px 12px;margin-bottom:14px;}
.d-chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.d-chart-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--d-muted);}
.panel-note{margin-top:14px;font-size:11px;color:var(--d-muted);background:var(--d-card);padding:10px 13px;border-radius:0 6px 6px 0;line-height:1.55;}
.marcas .panel-note{border-left:3px solid rgba(255,37,0,.4);}
.priv .panel-note{border-left:3px solid rgba(0,173,176,.4);}
.evo-mini{display:grid;gap:6px;margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.evo-cell{text-align:center;padding:8px 4px;border-radius:6px;}
.evo-cell.best{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.22);}
.evo-cell.warn{background:rgba(192,120,0,.05);border:1px solid rgba(192,120,0,.22);}
.evo-period{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:2px;}
.evo-val{font-size:13px;font-weight:700;}
.evo-pct{font-size:9px;margin-top:1px;}
/* ERROR / EMPTY */
.err-box{background:rgba(255,37,0,.05);border:1px solid rgba(255,37,0,.20);border-radius:10px;padding:20px 24px;font-size:12px;color:var(--text2);}
.err-box strong{color:var(--orange);display:block;margin-bottom:4px;}
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">U</div>
    <span class="brand-title">Ulpik</span>
    <span class="brand-sep">/</span>
    <span class="brand-sub">Dirección Comercial</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <select class="sem-select" id="semSelect" onchange="loadData(this.value)">
      <option>Cargando...</option>
    </select>
    <div class="brand-badge" id="semBadge">—</div>
  </div>
</div>

<div class="sec-nav">
  <button class="snav-btn active" onclick="navTo('s-kpi',this)">KPIs</button>
  <button class="snav-btn" onclick="navTo('s-budgets',this)">Presupuestos</button>
  <button class="snav-btn" onclick="navTo('s-asesores',this)">Asesores</button>
  <button class="snav-btn" onclick="navTo('s-evo',this)">Evolutivo</button>
  <button class="snav-btn" onclick="navTo('s-embudos',this)">Embudos</button>
  <button class="snav-btn" onclick="navTo('s-convenio',this)">Convenio</button>
  <button class="snav-btn" onclick="navTo('s-upsell',this)">Upsell</button>
  <button class="snav-btn" onclick="navTo('s-disc',this)">Taller DISC</button>
  <button class="snav-btn" onclick="navTo('s-pi',this)">Test PI</button>
  <button class="snav-btn" onclick="navTo('s-legal',this)">Ventas LEGAL</button>
</div>

<div class="main-wrap">
  <div id="s-kpi"      class="segment"></div>
  <div id="s-budgets"  class="segment"></div>
  <div id="s-asesores" class="segment"></div>
  <div id="s-evo"      class="segment"></div>
  <div id="s-embudos"  class="segment"></div>
  <div id="s-convenio" class="segment"></div>
  <div id="s-upsell"   class="segment"></div>
  <div id="s-disc"     class="segment"></div>
  <div id="s-pi"       class="segment"></div>
  <div id="s-legal"    class="segment"></div>
</div>

<script>
// ╔══════════════════════════════════════════════════════╗
// ║  ⚙  CONFIGURACIÓN — reemplaza con tu URL           ║
// ╚══════════════════════════════════════════════════════╝
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1A0BgFNjObhmCnI-W2XJlwAt9ir2rWtn9CxPIHfJD7wmOYLaSZyohkjOW52hFXqyr/exec';

// ─── ESTADO ───────────────────────────────────────────
let charts = {};
Chart.defaults.font.family = "'DM Sans', sans-serif";

// ─── HELPERS ──────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmt = n  => '$' + Number(n||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = (a,b) => b > 0 ? (a/b*100).toFixed(2) : '0.00';
const sumF = (arr,k) => arr.reduce((s,r)=>s+Number(r[k]||0),0);
const clamp = (v,mn,mx) => Math.min(Math.max(v,mn),mx);
const colAsesor = a => a==='Martín'?'var(--orange)': a==='Javier'?'rgba(130,59,218,.8)': a==='Nela'?'rgba(0,173,176,.8)':'rgba(160,160,160,.6)';

function killChart(k){ if(charts[k]){try{charts[k].destroy();}catch(e){} delete charts[k];} }

function loadBar(on){
  const b=$('lbar');
  if(on){b.className='lbar on';}
  else{b.className='lbar done';setTimeout(()=>b.className='lbar',600);}
}

// ─── NAV ──────────────────────────────────────────────
const SEC_IDS = ['s-kpi','s-budgets','s-asesores','s-evo','s-embudos','s-convenio','s-upsell','s-disc','s-pi','s-legal'];
function navTo(id,btn){
  $(id).scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
window.addEventListener('scroll',()=>{
  let cur='';
  SEC_IDS.forEach(id=>{const el=$(id);if(el&&el.getBoundingClientRect().top<130)cur=id;});
  document.querySelectorAll('.snav-btn').forEach((b,i)=>b.classList.toggle('active',SEC_IDS[i]===cur));
},{passive:true});

// ─── FETCH PRINCIPAL ──────────────────────────────────
async function loadData(semana){
  loadBar(true);
  try{
    const url = APPS_SCRIPT_URL + (semana?'?semana='+encodeURIComponent(semana):'');
    const res  = await fetch(url);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    updateSelector(data.semanas, data.semana_actual);
    renderAll(data);
  }catch(e){
    $('s-kpi').innerHTML=`<div class="err-box"><strong>Error de conexión</strong>Reemplaza APPS_SCRIPT_URL con tu URL de Apps Script.<br><code style="font-size:10px;">${e.message}</code></div>`;
  }finally{
    loadBar(false);
  }
}

function updateSelector(semanas,actual){
  const sel=$('semSelect');
  sel.innerHTML=(semanas||[]).map(s=>`<option value="${s.semana_id}"${s.semana_id===actual?' selected':''}>${s.label}</option>`).join('');
  const cur=(semanas||[]).find(s=>s.semana_id===actual);
  $('semBadge').textContent=cur?.badge||actual||'—';
}

// ─── CÓMPUTOS ─────────────────────────────────────────
function compute(d){
  const v=d.ventas||[], ch=d.chats||{}, edu=d.educacion||{}, pp=d.priv_pagos||[], ps=d.priv_stats||{}, m=d.metas||{};
  const vMarcas=v.filter(x=>x.categoria==='Marcas');
  const totalM=sumF(vMarcas,'monto'), totalLegal=sumF(v,'monto');
  const totalEdu=Number(edu.monto||0), totalPriv=sumF(pp,'monto');
  const total=totalLegal+totalEdu+totalPriv;
  const metaM=Number(m.meta_marcas||0), metaE=Number(m.meta_edu||0);
  const pctM=metaM>0?totalM/metaM*100:0, pctE=metaE>0?totalEdu/metaE*100:0;

  // per asesor
  const names=[...new Set([...v.map(x=>x.asesor).filter(Boolean),'Martín','Javier','Nela','Pau'])];
  const ad={};
  names.forEach(a=>{
    const av=v.filter(x=>x.asesor===a), avm=av.filter(x=>x.categoria==='Marcas');
    const monto=sumF(av,'monto'), nc=Number(ch[a]||0);
    ad[a]={monto,ventas:av.length,ventasMarcas:avm.length,chats:nc,
      conv:nc>0?(avm.length/nc*100).toFixed(2):null,
      ticket:av.length>0?(monto/av.length).toFixed(2):0,
      pct:totalLegal>0?(monto/totalLegal*100).toFixed(1):0};
  });
  const maxM=Math.max(...names.map(a=>ad[a].monto),1);

  // días
  const diasMap={};
  v.forEach(x=>{diasMap[x.fecha]=(diasMap[x.fecha]||0)+Number(x.monto||0);});
  const dias=Object.keys(diasMap).sort();

  // productos
  const prodMap={};
  v.forEach(x=>{if(!prodMap[x.producto])prodMap[x.producto]={ventas:0,monto:0};prodMap[x.producto].ventas++;prodMap[x.producto].monto+=Number(x.monto||0);});

  return{v,ch,edu,pp,ps,m,vMarcas,totalM,totalLegal,totalEdu,totalPriv,total,metaM,metaE,pctM,pctE,names,ad,maxM,diasMap,dias,prodMap};
}

// ─── RENDER ALL ───────────────────────────────────────
function renderAll(d){
  const c=compute(d);
  rKPIs(d,c); rPresupuestos(d,c); rAsesores(d,c);

  rConvenio(d.convenio||{}); rUpsell(d.upsell||{});
  rDisc(d.disc||[]); rPI(d.pi||{}); rLegal(d,c);
}

  </div></div>`;

  buildStg('mstg','marcas',[

          y2:{position:'right',grid:{display:false},ticks:{font:{size:9},color:'rgba(248,237,226,.5)',callback:v=>'$'+v}}}}});
  }
}

function buildStg(id,cls,stages){
  const el=$(id); if(!el) return;
  const max=stages[0]?.val||1;
  el.innerHTML=stages.map((s,i)=>{
    const p=Math.max(s.val/max*100,3);
    return `<div class="d-stage"><div class="d-stage-meta"><span class="d-stage-name">${s.name}</span><span style="font-size:10px;color:var(--d-muted);">${s.sub}</span></div>
      <div class="d-stage-bar-bg"><div class="d-stage-bar-fill" style="width:${p}%;"><span class="d-stage-bar-label">${s.label}</span></div></div></div>
      ${i<stages.length-1&&s.conv?`<div class="d-conv-badge">${s.conv}</div>`:''}`}).join('');
}

// ══════════════ §8 Convenio ═══════════════════════════

  <div class="seg-hdr"><span class="seg-num">08</span><span class="seg-dot" style="background:var(--teal);"></span>
    <span class="seg-title">Convenio Diseñadores</span><span class="seg-meta">Última gestión: ${ug}</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">

      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Respondieron</div><div class="num-lg co">${re}</div><div style="font-size:10px;color:var(--text3);">${p1}%</div></div>

      <div class="kpi-card" style="text-align:center;padding:12px;background:rgba(0,173,176,.06);border-color:rgba(0,173,176,.20);"><div class="kpi-label ct">Convenios</div><div class="num-lg ct">${co}</div><div style="font-size:10px;color:var(--text3);">${p3}%</div></div></div>
    <div class="funnel-row"><span class="funnel-label">Contactados</span><div class="funnel-track"><div class="funnel-fill" style="width:100%;background:rgba(255,37,0,.12);"><span class="co">${ct}</span></div></div></div>
    <div class="funnel-arrow">↓ ${p1}% responden</div>
    <div class="funnel-row"><span class="funnel-label">Respondieron</span><div class="funnel-track"><div class="funnel-fill" style="width:${p1}%;background:rgba(255,37,0,.22);min-width:40px;"><span class="co">${re}</span></div></div></div>
    <div class="funnel-arrow">↓ ${p2}% llamada</div>
    <div class="funnel-row"><span class="funnel-label">Llamadas</span><div class="funnel-track"><div class="funnel-fill" style="width:${ct>0?ll/ct*100:3}%;background:rgba(0,173,176,.35);min-width:40px;"><span class="ct">${ll}</span></div></div></div>
    <div class="funnel-arrow">↓ ${p3}% convenio</div>
    <div class="funnel-row"><span class="funnel-label">Convenio</span><div class="funnel-track"><div class="funnel-fill" style="width:${ct>0?co/ct*100:3}%;background:var(--teal);min-width:40px;"><span>${co}</span></div></div></div>
    <div class="warn-box" style="margin-top:12px;"><div class="a-title" style="color:var(--warn);">⏸ Estado actual</div>
      <div class="a-body">Última gestión: ${ug}. ${co} diseñadores con convenio o en proceso pendientes de activación.</div></div></div>`;

// ══════════════ §10 DISC ══════════════════════════════
function rDisc(disc){
  const tot=disc.reduce((s,d)=>s+Number(d.agendados||0),0);
  const pres=disc.reduce((s,d)=>s+Number(d.presentados||0),0);
  const vts=disc.reduce((s,d)=>s+Number(d.ventas||0),0);
  const maxAg=Math.max(...disc.map(d=>Number(d.agendados||0)),1);
  $('s-disc').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">10</span><span class="seg-dot" style="background:var(--purple);"></span>
    <span class="seg-title">Taller DISC</span><span class="seg-meta">${tot} agendados histórico</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin:0;">Taller DISC · Funnel histórico</div>
      <span class="chip chip-o">${vts===0?'0% conversión':vts+' ventas'}</span></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Agendados total</div><div class="num-lg">${tot}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Se presentaron</div><div class="num-lg cw">${pres}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;background:rgba(255,37,0,.04);border-color:rgba(255,37,0,.15);"><div class="kpi-label co">Ventas</div><div class="num-lg cs">${vts}</div></div></div>
    ${disc.map(d=>`<div class="funnel-row"><span class="funnel-label">${d.mes} (${d.agendados} ag.)</span>
      <div class="funnel-track"><div class="funnel-fill" style="width:${Number(d.agendados)/maxAg*100}%;background:rgba(130,59,218,.35);"><span class="cp">${d.agendados}</span></div></div></div>`).join('')}
    <div class="alert-box" style="margin-top:12px;"><div class="a-title" style="color:var(--orange);">⚠ Rotura de funnel</div>
      <div class="a-body">Solo ${pres} de ${tot} agendados se presentaron (${tot>0?(pres/tot*100).toFixed(1):0}%). Revisar protocolo de confirmación pre-taller.</div></div></div>`;
}

// ══════════════ §11 Test PI ═══════════════════════════

  const sg=le-co;
  $('s-pi').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">11</span><span class="seg-dot" style="background:var(--purple);"></span>
    <span class="seg-title">Test PI</span><span class="seg-meta">${le} leads · ${ne} en negociación · ${vc} ventas</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin:0;">Test PI · Funnel</div>
      <div style="display:flex;gap:8px;"><span class="chip chip-p">${vc} ventas</span><span class="chip chip-w">${ne} en negociación</span></div></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Leads</div><div class="num-lg cp">${le}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Contactados</div><div class="num-lg ct">${co}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;"><div class="kpi-label">Respondieron</div><div class="num-lg ct">${re}</div></div>
      <div class="kpi-card" style="text-align:center;padding:12px;background:rgba(130,59,218,.06);border-color:rgba(130,59,218,.20);"><div class="kpi-label cp">Negociación</div><div class="num-lg cw">${ne}</div></div></div>
    <div class="funnel-row"><span class="funnel-label">Leads totales</span><div class="funnel-track"><div class="funnel-fill" style="width:100%;background:rgba(130,59,218,.15);"><span class="cp">${le}</span></div></div></div>
    <div class="funnel-arrow">↓ ${co} contactados (${le>0?(co/le*100).toFixed(1):0}%) — ${sg} sin gestionar</div>
    <div class="funnel-row"><span class="funnel-label">Contactados</span><div class="funnel-track"><div class="funnel-fill" style="width:${le>0?co/le*100:3}%;background:rgba(130,59,218,.30);min-width:40px;"><span class="cp">${co}</span></div></div></div>
    <div class="funnel-row"><span class="funnel-label">Negociación</span><div class="funnel-track"><div class="funnel-fill" style="width:${le>0?ne/le*100:3}%;background:var(--warn);min-width:40px;"><span>${ne}</span></div></div></div>
    <div class="funnel-row"><span class="funnel-label">Ventas cerradas</span><div class="funnel-track"><div class="funnel-fill" style="width:${le>0?vc/le*100:3}%;background:var(--text3);min-width:30px;"><span style="color:#fff;">${vc}</span></div></div></div>
    ${sg>0?`<div class="info-box" style="margin-top:10px;"><div class="a-title" style="color:var(--purple);">💡 Oportunidad: ${sg} leads sin gestionar</div>
      <div class="a-body">Con la tasa histórica de conversión contacto→venta, gestionar estos leads esta semana representa una oportunidad real de cierres.</div></div>`:''}</div>`;
}

// ══════════════ §12 Ventas LEGAL ══════════════════════
function rLegal(d,c){
  const{v,totalLegal,totalM,prodMap}=c;
  const tickProm=v.length>0?totalLegal/v.length:0;
  const topP=Object.entries(prodMap).sort((a,b)=>b[1].monto-a[1].monto)[0];
  const chips=Object.entries(prodMap).map(([p,x])=>{
    const pv=totalLegal>0?(x.monto/totalLegal*100).toFixed(1):0;
    return `<div style="display:flex;align-items:center;gap:5px;font-size:11px;"><span class="chip chip-o" style="font-size:9px;">${p}</span>${x.ventas}v · ${fmt(x.monto)} · ${pv}%</div>`;}).join('');
  const rows=v.map(x=>`<tr><td>${x.fecha}</td>
    <td style="font-weight:600;color:${colAsesor(x.asesor||'')};">${x.asesor||'—'}</td>
    <td>${x.categoria}</td>
    <td><span class="chip chip-o" style="font-size:9px;">${x.producto}</span></td>
    <td class="r co" style="font-family:'DM Mono',monospace;">${fmt(x.monto)}</td></tr>`).join('');

  $('s-legal').innerHTML=`
  <div class="seg-hdr"><span class="seg-num">12</span><span class="seg-dot" style="background:var(--orange);"></span>
    <span class="seg-title">Ventas LEGAL — Detalle completo</span><span class="seg-meta">${v.length} transacciones · ${fmt(totalLegal)}</span></div>
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);">
      <div style="padding:16px 20px;border-right:1px solid var(--border);"><div class="kpi-label">Total</div><div style="font-size:22px;font-weight:700;color:var(--orange);font-family:'DM Mono',monospace;">${fmt(totalLegal)}</div><div style="font-size:10px;color:var(--text3);">${v.length} transacciones</div></div>
      <div style="padding:16px 20px;border-right:1px solid var(--border);"><div class="kpi-label">Marcas</div><div style="font-size:22px;font-weight:700;color:var(--orange);font-family:'DM Mono',monospace;">${fmt(totalM)}</div><div style="font-size:10px;color:var(--text3);">${c.vMarcas.length} ventas</div></div>
      <div style="padding:16px 20px;border-right:1px solid var(--border);"><div class="kpi-label">Ticket promedio</div><div style="font-size:22px;font-weight:700;color:var(--teal);font-family:'DM Mono',monospace;">${fmt(tickProm)}</div></div>
      <div style="padding:16px 20px;"><div class="kpi-label">Mejor producto</div><div style="font-size:14px;font-weight:600;margin-top:4px;">${topP?topP[0]:'—'}</div><div style="font-size:10px;color:var(--text3);">${topP?topP[1].ventas+'v · '+fmt(topP[1].monto):''}</div></div></div>
    <div style="padding:0 20px 20px;">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:14px 0 8px;">Resumen por producto</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">${chips}</div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:6px 0 8px;">Detalle por transacción</div>
      <table class="data-table" style="font-size:11px;">
        <thead><tr><th>Fecha</th><th>Asesor</th><th>Categoría</th><th>Producto</th><th class="r">Monto</th></tr></thead>
        <tbody>${rows}<tr class="t-total"><td colspan="4">TOTAL · ${v.length} TRANSACCIONES</td><td class="r co" style="font-family:'DM Mono',monospace;">${fmt(totalLegal)}</td></tr></tbody></table></div></div>`;
}

// ─── INIT ─────────────────────────────────────────────
loadData();
</script>
