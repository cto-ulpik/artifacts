<script>
// ============================================================
// DATOS GENÉRICOS / ILUSTRATIVOS — legaltech tipo ULPIK SAS-BIC
// Editá SOLO este objeto para usar datos reales. Todo se recalcula solo.
// ============================================================
const DATA_BASE = {
  periodo: 'Enero - Mayo 2026',
  mesesPeriodo: 5,
  diaNovenoDigito: 18,
  tarifaIR: 0.22,
  regimenLabel: 'Tarifa reducida 22% (-3 pts, LRTI Art. 37.2)',
  balance: { activos:48500, activoCorriente:32800, pasivos:18200, pasivoCorriente:14600, patrimonio:30300 },
  pl: { ingresos:62400, reembolsos:8200, costos:9800, gastos:28600, utilidad:24000 },
  gastosDetalle: [
    { rubro:'Sueldos y salarios', monto:14200, deducible:'Sí', art:'LRTI Art. 10 num. 9', cond:'Con aportes IESS al día' },
    { rubro:'Arriendo oficina', monto:4800, deducible:'Sí', art:'LRTI Art. 10 num. 1', cond:'Con comprobante electrónico' },
    { rubro:'Software / licencias (SaaS, Odoo)', monto:3200, deducible:'Sí', art:'LRTI Art. 10 num. 7', cond:'Vinculado a la actividad' },
    { rubro:'Servicios profesionales', monto:2600, deducible:'Sí', art:'LRTI Art. 10 num. 1', cond:'Con retención aplicada' },
    { rubro:'Atenciones / agasajos', monto:1400, deducible:'Parcial', art:'LRTI Art. 10 num. 7', cond:'Tope: 2% gastos generales' },
    { rubro:'Multas e intereses SRI', monto:600, deducible:'No', art:'LRTI Art. 10 (no deducible)', cond:'Gasto no deducible' },
    { rubro:'Gastos personales socio', monto:800, deducible:'No', art:'LRTI Art. 10 (no relacionado)', cond:'Ajustar en conciliación' },
    { rubro:'Otros operacionales', monto:1000, deducible:'Sí', art:'LRTI Art. 10', cond:'Con sustento' }
  ],
  iva: { ivaCompras:4320, ivaVentas:9360, baseCompras:28800, baseVentas:62400 },
  retenciones: { soportadas:1248, generadas:624 },
  anterior: { ingresos:54800, utilidad:19500, liquidez:2.05 }
};

// ---------- helpers ----------
const fmt = n => (n==null||isNaN(n)) ? '—' : new Intl.NumberFormat('es-EC',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n);
const pct = n => (n==null||isNaN(n)) ? '—' : (n*100).toFixed(1)+'%';
const delta = (act,ant)=> !ant ? null : (act-ant)/ant;
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// ---------- lectura Excel ----------
const findValue=(rows,kws)=>{ if(!rows)return null; for(const row of rows){const cells=Object.values(row);const label=cells.find(c=>typeof c==='string');if(!label)continue;const n=norm(label);if(kws.some(k=>n.includes(k))){const num=cells.find(c=>typeof c==='number');if(num!=null)return num;}} return null; };
const sumColumn=(rows,kws)=>{ if(!rows||!rows.length)return null; const headers=Object.keys(rows[0]);const t=headers.find(h=>kws.some(k=>norm(h).includes(k)));if(!t)return null;let s=0,f=false;for(const r of rows){if(typeof r[t]==='number'){s+=r[t];f=true;}}return f?s:null; };
const findSheet=(names,kws)=>names.find(n=>kws.some(k=>norm(n).includes(k)));
const extractRows=rows=>{ if(!rows)return[]; const out=[]; rows.forEach((row,i)=>{const cells=Object.values(row);const label=cells.find(c=>typeof c==='string');const num=cells.find(c=>typeof c==='number');if(label&&num!=null)out.push({label:String(label).trim(),value:num,key:''+i});}); return out; };
const numericColumns=rows=>{ if(!rows||!rows.length)return[]; const headers=Object.keys(rows[0]);return headers.filter(h=>rows.some(r=>typeof r[h]==='number')); };
const sumNamedColumn=(rows,col)=>{ if(!rows||!col)return null; let s=0,f=false;for(const r of rows){if(typeof r[col]==='number'){s+=r[col];f=true;}}return f?s:null; };

function parseWorkbook(wb){
  const names=wb.SheetNames;
  const sheet=n=>n?XLSX.utils.sheet_to_json(wb.Sheets[n],{defval:null}):[];
  const balN=findSheet(names,['balance','esf','situacion','estado de situacion']);
  const plN=findSheet(names,['perdid','pyg','resultado','eri','p&l','p l','ganancia']);
  const compN=findSheet(names,['compra','proveedor','libro c','adquisicion']);
  const ventN=findSheet(names,['venta','cliente','libro v','factura','ingreso']);
  const bal=sheet(balN),pl=sheet(plN),comp=sheet(compN),vent=sheet(ventN);
  const detected={
    activos:findValue(bal,['total activo','activos total','activo total']),
    activoCorriente:findValue(bal,['activo corriente','activos corrientes']),
    pasivos:findValue(bal,['total pasivo','pasivos total','pasivo total']),
    pasivoCorriente:findValue(bal,['pasivo corriente','pasivos corrientes']),
    patrimonio:findValue(bal,['total patrimonio','patrimonio total','patrimonio neto','total patrimonio neto']),
    ingresos:findValue(pl,['total ingreso','ingresos total','ventas total','ingresos operacional','total de ingreso']),
    costos:findValue(pl,['costo de venta','total costo','costos']),
    gastos:findValue(pl,['total gasto','gastos total','gastos operacional']),
    utilidad:findValue(pl,['utilidad neta','resultado del ejerc','utilidad del ejerc','utilidad antes','resultado neto','ganancia neta','resultado del periodo']),
    ivaCompras:sumColumn(comp,['valor iva','iva 15','iva']),
    baseCompras:sumColumn(comp,['base imponible','subtotal','base 15','base grav']),
    ivaVentas:sumColumn(vent,['valor iva','iva 15','iva']),
    baseVentas:sumColumn(vent,['base imponible','subtotal','base 15','base grav']),
    retSoportadas:sumColumn(comp,['retencion','ret renta','ret iva']),
    retGeneradas:sumColumn(vent,['retencion','ret renta','ret iva'])
  };
  const raw={ balanceRows:extractRows(bal), plRows:extractRows(pl), compCols:numericColumns(comp), ventCols:numericColumns(vent), compData:comp, ventData:vent };
  return { detected, raw, sheets:{ balN,plN,compN,ventN, all:names } };
}

// ---------- estado ----------
const S = {
  view:'exec', D:JSON.parse(JSON.stringify(DATA_BASE)),
  showConfig:false, upload:null, mapping:{}, uploadError:null, isReal:false
};

const camposFila=[
  {id:'activos',label:'Total Activos',fuente:'balanceRows'},
  {id:'activoCorriente',label:'Activo corriente',fuente:'balanceRows'},
  {id:'pasivos',label:'Total Pasivos',fuente:'balanceRows'},
  {id:'pasivoCorriente',label:'Pasivo corriente',fuente:'balanceRows'},
  {id:'patrimonio',label:'Patrimonio',fuente:'balanceRows'},
  {id:'ingresos',label:'Ingresos',fuente:'plRows'},
  {id:'costos',label:'Costos',fuente:'plRows'},
  {id:'gastos',label:'Gastos',fuente:'plRows'},
  {id:'utilidad',label:'Utilidad / Resultado',fuente:'plRows'}
];
const camposColumna=[
  {id:'baseCompras',label:'Base imponible Compras',fuente:'compCols',data:'compData'},
  {id:'ivaCompras',label:'IVA Compras',fuente:'compCols',data:'compData'},
  {id:'retSoportadas',label:'Retención soportada',fuente:'compCols',data:'compData'},
  {id:'baseVentas',label:'Base imponible Ventas',fuente:'ventCols',data:'ventData'},
  {id:'ivaVentas',label:'IVA Ventas',fuente:'ventCols',data:'ventData'},
  {id:'retGeneradas',label:'Retención generada',fuente:'ventCols',data:'ventData'}
];

function valorCampo(id){
  if(!S.upload)return null;
  const m=S.mapping[id];
  if(m!==undefined&&m!==''){
    const fc=camposFila.find(c=>c.id===id);
    if(fc){const fila=S.upload.raw[fc.fuente].find(r=>r.key===m);return fila?fila.value:null;}
    const cc=camposColumna.find(c=>c.id===id);
    if(cc)return sumNamedColumn(S.upload.raw[cc.data],m);
  }
  return S.upload.detected[id];
}

// ---------- cálculos ----------
function analytics(D){
  const balanceDiff=D.balance.activos-(D.balance.pasivos+D.balance.patrimonio);
  const balanceCierra=Math.abs(balanceDiff)<1;
  const ivaResultado=D.iva.ivaVentas-D.iva.ivaCompras;
  const noDeducible=D.gastosDetalle.filter(g=>g.deducible==='No').reduce((s,g)=>s+g.monto,0);
  const baseImponibleIR=D.pl.utilidad+noDeducible;
  const irEstimado=baseImponibleIR>0?baseImponibleIR*D.tarifaIR:0;
  const margenNeto=D.pl.utilidad/D.pl.ingresos;
  const liquidez=D.balance.activoCorriente/D.balance.pasivoCorriente;
  const endeudamiento=D.balance.pasivos/D.balance.activos;
  const roa=D.pl.utilidad/D.balance.activos;
  const ratioReembolsos=D.pl.reembolsos/D.pl.ingresos;
  const ratioRet=D.retenciones.generadas>0?D.retenciones.soportadas/D.retenciones.generadas:null;
  return {balanceCierra,balanceDiff,ivaResultado,noDeducible,baseImponibleIR,irEstimado,margenNeto,liquidez,endeudamiento,roa,ratioReembolsos,ratioRet};
}
function kpiStatus(v,t){
  if(v==null||isNaN(v))return 'gray';
  if(t==='margen')return v>0.20?'green':v>0.10?'yellow':'red';
  if(t==='liquidez')return v>1.5?'green':v>1.0?'yellow':'red';
  if(t==='endeud')return v<0.40?'green':v<0.60?'yellow':'red';
  if(t==='roa')return v>0.10?'green':v>0.03?'yellow':'red';
  return 'gray';
}
function buildAlertas(a,D){
  const out=[];
  if(!a.balanceCierra)out.push({riesgo:'ALTO',titulo:'Balance descuadrado: A ≠ P + Patrimonio',articulo:'NIIF / Ley Compañías Art. 289',impacto:Math.abs(a.balanceDiff),accion:'Conciliar partidas antes de presentar EEFF; no declarar con descuadre'});
  if(a.noDeducible>0)out.push({riesgo:'ALTO',titulo:`Gastos no deducibles detectados: ${fmt(a.noDeducible)}`,articulo:'LRTI Art. 10 / RALRTI Art. 28',impacto:a.noDeducible*D.tarifaIR,accion:'Sumar a base imponible en conciliación tributaria (form. 101 casillero 802+)'});
  if(a.liquidez<1)out.push({riesgo:'ALTO',titulo:`Liquidez corriente crítica: ${a.liquidez.toFixed(2)} (< 1.0)`,articulo:'Código Tributario Art. 21 (mora)',impacto:D.pl.gastos*0.015,accion:'Plan de cobranza acelerada; riesgo de no cubrir obligaciones SRI/IESS del mes'});
  else if(a.liquidez<1.5)out.push({riesgo:'MEDIO',titulo:`Liquidez ajustada: ${a.liquidez.toFixed(2)} (benchmark > 1.5)`,articulo:'Gestión de tesorería',impacto:D.balance.pasivoCorriente*0.05,accion:'Vigilar calce de cobros y pagos próximos 30 días'});
  if(a.endeudamiento>0.6)out.push({riesgo:'MEDIO',titulo:`Endeudamiento elevado: ${pct(a.endeudamiento)}`,articulo:'LRTI Art. 10 num. 2 (subcapitalización 3:1)',impacto:D.balance.pasivos*0.03,accion:'Validar relación deuda/patrimonio ≤ 3:1 para deducir intereses de partes relacionadas'});
  if(a.irEstimado>0)out.push({riesgo:'MEDIO',titulo:`Provisión IR no constituida: ${fmt(a.irEstimado)}`,articulo:`LRTI Art. 37 (tarifa ${pct(D.tarifaIR)})`,impacto:a.irEstimado*0.20,accion:`Constituir provisión IR de ${fmt(a.irEstimado)}; vence 10-28 abril 2027 (form. 101)`});
  if(a.ratioRet&&a.ratioRet>1.8)out.push({riesgo:'MEDIO',titulo:`Retenciones soportadas ${a.ratioRet.toFixed(1)}x las generadas`,articulo:'LRTI Art. 50 / RALRTI Art. 92',impacto:D.retenciones.soportadas*0.25,accion:'Cargar comprobantes de retención de clientes en SRI en línea para crédito tributario'});
  if(a.margenNeto<0.10)out.push({riesgo:'MEDIO',titulo:`Margen neto bajo: ${pct(a.margenNeto)}`,articulo:'Análisis de rentabilidad',impacto:D.pl.ingresos*0.02,accion:'Revisar estructura de costos y precios de servicios'});
  if(a.ratioReembolsos>0.15)out.push({riesgo:'BAJO',titulo:`Reembolsos SENADI altos: ${pct(a.ratioReembolsos)} de ingresos`,articulo:'RALRTI Art. 36 (reembolso de gastos)',impacto:D.pl.reembolsos*0.03,accion:'Documentar reembolsos con liquidación de compras o nota de crédito; no son ingreso gravado si están bien soportados'});
  return out.sort((x,y)=>y.impacto-x.impacto).slice(0,5);
}
function buildCashflow(a,D){
  const ingM=D.pl.ingresos/D.mesesPeriodo, gtoM=(D.pl.costos+D.pl.gastos)/D.mesesPeriodo, ivaM=Math.max(0,a.ivaResultado)/D.mesesPeriodo, dig=D.diaNovenoDigito;
  return [
    {p:'30 días',detalle:`IVA + Retenciones (form. 104/103, vence día ${dig})`,ing:ingM,egr:gtoM,impuestos:ivaM,saldo:ingM-gtoM-ivaM},
    {p:'60 días',detalle:'IVA mensual + provisión IR acumulada',ing:ingM*2,egr:gtoM*2,impuestos:ivaM*2+a.irEstimado*0.10,saldo:(ingM-gtoM)*2-ivaM*2-a.irEstimado*0.10},
    {p:'90 días',detalle:'IVA + anticipo IR (1ª cuota) + 15% utilidades trab.',ing:ingM*3,egr:gtoM*3,impuestos:ivaM*3+a.irEstimado*0.25,saldo:(ingM-gtoM)*3-ivaM*3-a.irEstimado*0.25}
  ];
}

  {obl:'IVA mensual (form. 104)',frec:'Mensual',fecha:`10-28 del mes siguiente (día ${S.D.diaNovenoDigito} s/ 9° dígito)`,estado:'Recurrente'},
  {obl:'Retenciones IR (form. 103)',frec:'Mensual',fecha:'10-28 del mes siguiente',estado:'Recurrente'},
  {obl:'ATS (Anexo Transaccional)',frec:'Mensual',fecha:'10-28 del mes siguiente',estado:'Recurrente'},
  {obl:'REBEFICS (beneficiarios finales)',frec:'Anual',fecha:'10-28 febrero',estado:'Sociedades'},
  {obl:'IR Sociedades (form. 101)',frec:'Anual',fecha:'10-28 abril (ejercicio anterior)',estado:'Crítico'},
  {obl:'15% Utilidades trabajadores',frec:'Anual',fecha:'Pago hasta abril; legalización MRL mayo-jun',estado:'Laboral'},
  {obl:'Anticipo IR (2 cuotas)',frec:'Semestral',fecha:'Julio y septiembre',estado:'Cuotas'}
];
function buildCorreo(alertas,a,D){
  const altas=alertas.filter(x=>x.riesgo==='ALTO'), medias=alertas.filter(x=>x.riesgo==='MEDIO');
  const impactoTotal=alertas.reduce((s,x)=>s+x.impacto,0);
  const compliance=altas.length===0?`sin alertas críticas (${medias.length} de riesgo MEDIO, exposición agregada ${fmt(impactoTotal)})`:`con ${altas.length} alerta(s) de riesgo ALTO que requieren acción inmediata`;
  return `Asunto: Reporte Financiero ULPIK · ${D.periodo} · Compliance SRI

Estimada Gerencia,

Remito el reporte financiero ejecutivo de ULPIK correspondiente a ${D.periodo}.

ESTADO FINANCIERO

- Balance contable: ${a.balanceCierra?'Cuadrado (A = P + Pat verificado)':'DESCUADRADO - requiere conciliacion'}

- IR proyectado: ${fmt(a.irEstimado)}
- IVA del periodo: ${a.ivaResultado>=0?fmt(a.ivaResultado)+' a pagar':fmt(Math.abs(a.ivaResultado))+' credito tributario'}
- Compliance: Auditoria automatica finalizada ${compliance}.

RECOMENDACION PRIORITARIA
${alertas[0]?alertas[0].accion:'Mantener provisiones tributarias al dia y continuar plan operativo.'}

Quedo a disposicion para revisar el detalle del dashboard adjunto y definir el plan de accion para los proximos 30 dias.

Cordialmente,
CFO Virtual ULPIK
Fecha: ${new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})}`;
}

    // 5b. Calendario
    const calRows=calendario().map(c=>`<tr><td class="fw">${esc(c.obl)}</td><td class="xs txt-gris6">${esc(c.frec)}</td><td class="xs txt-gris6">${esc(c.fecha)}</td><td class="tc"><span class="tag ${c.estado==='Crítico'?'tag-red':c.estado==='Recurrente'?'tag-gray':'tag-yellow'}">${esc(c.estado)}</span></td></tr>`).join('');
    const cal=section('5b','Calendario de Obligaciones SRI 2026',`<table><thead><tr><th>Obligación</th><th>Frecuencia</th><th>Vencimiento 2026</th><th class="tc">Tipo</th></tr></thead><tbody>${calRows}</tbody></table>`);

    // 6. Informe ejecutivo
    const altasN=alertas.filter(x=>x.riesgo==='ALTO').length, mediasN=alertas.filter(x=>x.riesgo==='MEDIO').length;
    const riesgoBox = altasN>0
      ? `<div style="background:var(--rojo50);border-left:4px solid var(--rojo);padding:12px"><h4 class="b" style="color:#7f1d1d;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">⚠ Riesgos inmediatos</h4><ul style="list-style:disc;margin-left:18px;color:#991b1b" class="xs">${alertas.filter(x=>x.riesgo==='ALTO').map(al=>`<li>${esc(al.titulo)}</li>`).join('')}</ul></div>`
      : `<div style="background:var(--negro);color:#fff;padding:12px;border-radius:6px"><h4 class="b" style="color:#f87171;font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">⚠ Riesgos inmediatos</h4><p style="color:#d4d4d4" class="xs">Sin riesgos críticos. Exposición agregada de alertas MEDIO: ${fmt(alertas.filter(x=>x.riesgo==='MEDIO').reduce((s,al)=>s+al.impacto,0))}; ejecutar acciones recomendadas la elimina.</p></div>`;
    const recos = alertas.length===0?'<li>Mantener provisiones al día y continuar plan operativo.</li>':alertas.slice(0,3).map(al=>`<li>${esc(al.accion)}</li>`).join('');
    const inf=section('6','Informe Ejecutivo para Gerencia',`<div class="grid g3" style="margin-bottom:16px">
      ${kpi('Ingresos totales',fmt(D.pl.ingresos),{sub:D.periodo,accent:true,deltaVal:delta(D.pl.ingresos,D.anterior.ingresos)})}
      ${kpi('Margen neto',pct(a.margenNeto),{status:kpiStatus(a.margenNeto,'margen')})}
      ${kpi('IR proyectado',fmt(a.irEstimado),{sub:'Tarifa '+pct(D.tarifaIR)})}
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="bl"><h4>Situación actual</h4><ul style="list-style:disc">
        <li>Ingresos ${fmt(D.pl.ingresos)} (crecimiento ${pct(delta(D.pl.ingresos,D.anterior.ingresos))} vs período anterior), utilidad ${fmt(D.pl.utilidad)} con margen ${pct(a.margenNeto)}</li>
        <li>Balance ${a.balanceCierra?'cuadrado':'descuadrado'}; endeudamiento ${pct(a.endeudamiento)}, liquidez ${a.liquidez.toFixed(2)}; estructura ${a.endeudamiento<0.5?'conservadora':'a vigilar'}</li>
        <li>Compliance SRI: ${altasN} alerta(s) ALTA(s), ${mediasN} MEDIA(s); IR proyectado ${fmt(a.irEstimado)} bajo régimen ${pct(D.tarifaIR)}</li>
      </ul></div>
      <div class="bl"><h4>Recomendaciones (próximos 7 días)</h4><ol style="list-style:decimal">${recos}</ol></div>
      ${riesgoBox}
    </div>`);

    // 7. Correo
    const mail=section('7','Correo Genérico para Gerencia',`<textarea id="correo" readonly>${esc(correo)}</textarea>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap" class="no-print">
        <button class="btn btn-rojo" data-act="copyMail">↓ Copiar</button>
        <button class="btn btn-negro" data-act="openMail">✉ Abrir en correo</button>
      </div>`);

    main=valid+tres+ded+ind+alert+cf+cal+inf+mail;
  }

  const footer=`<footer><div class="ft"><strong style="color:var(--gris700)">CFO Virtual ULPIK</strong> · Marco PAPA · Calendario SRI 2026 · LRTI/RALRTI vigente<br><span style="color:#a3a3a3">Generado el ${new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})} · Tarifa IR e indicadores configurables</span></div></footer>`;

  document.getElementById('app').innerHTML = uploader + header + config + main + footer;
  bind(correo,D);
}

// ---------- eventos ----------
function bind(correo,D){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick=()=>{
      const act=el.dataset.act;
      if(act==='toggleConfig')S.showConfig=!S.showConfig;
      else if(act==='toggleView')S.view=S.view==='exec'?'data':'exec';
      else if(act==='print'){window.print();return;}
      else if(act==='cancelMap'){S.upload=null;S.mapping={};}
      else if(act==='applyUpload'){applyUpload();return;}
      else if(act==='copyMail'){navigator.clipboard&&navigator.clipboard.writeText(correo);return;}
      else if(act==='openMail'){const a=document.createElement('a');a.href=`mailto:?subject=${encodeURIComponent('Reporte Financiero ULPIK · '+D.periodo)}&body=${encodeURIComponent(correo)}`;a.click();return;}
      render();
    };
  });
  const fi=document.getElementById('fileInput');
  if(fi)fi.onchange=handleFile;
  document.querySelectorAll('[data-field]').forEach(el=>{
    el.onchange=()=>{
      const f=el.dataset.field;
      if(f==='tarifaIR'){S.D.tarifaIR=parseFloat(el.value);S.D.regimenLabel=el.options[el.selectedIndex].text;}
      else if(f==='diaNovenoDigito')S.D.diaNovenoDigito=parseInt(el.value)||18;
      else S.D[f]=el.value;
      render();
    };
  });
  document.querySelectorAll('[data-map]').forEach(el=>{
    el.onchange=()=>{ S.mapping[el.dataset.map]=el.value; render(); };
  });
}

async function handleFile(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  S.uploadError=null;
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const {detected,raw,sheets}=parseWorkbook(wb);
    S.upload={fileName:file.name,detected,raw,sheets};
    S.mapping={};
  }catch(err){ S.uploadError='No se pudo leer el archivo: '+err.message; S.upload=null; }
  render();
}

function applyUpload(){
  if(!S.upload)return;
  const v=id=>valorCampo(id);
  const D=S.D;
  if(v('activos')!=null)D.balance.activos=v('activos');
  if(v('activoCorriente')!=null)D.balance.activoCorriente=v('activoCorriente');
  if(v('pasivos')!=null)D.balance.pasivos=v('pasivos');
  if(v('pasivoCorriente')!=null)D.balance.pasivoCorriente=v('pasivoCorriente');
  if(v('patrimonio')!=null)D.balance.patrimonio=v('patrimonio');
  if(v('ingresos')!=null)D.pl.ingresos=v('ingresos');
  if(v('costos')!=null)D.pl.costos=v('costos');
  if(v('gastos')!=null)D.pl.gastos=v('gastos');
  if(v('utilidad')!=null)D.pl.utilidad=v('utilidad');
  else if(v('ingresos')!=null)D.pl.utilidad=v('ingresos')-(v('costos')||0)-(v('gastos')||0);
  if(v('ivaCompras')!=null)D.iva.ivaCompras=v('ivaCompras');
  if(v('baseCompras')!=null)D.iva.baseCompras=v('baseCompras');
  if(v('ivaVentas')!=null)D.iva.ivaVentas=v('ivaVentas');
  if(v('baseVentas')!=null)D.iva.baseVentas=v('baseVentas');
  if(v('retSoportadas')!=null)D.retenciones.soportadas=v('retSoportadas');
  if(v('retGeneradas')!=null)D.retenciones.generadas=v('retGeneradas');
  S.isReal=true; S.upload=null; S.mapping={};
  render();
}

render();
</script>
